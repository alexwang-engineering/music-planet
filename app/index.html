<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星云 · Nebula</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #ff5a12;
    --accent2: #ff9a3d;
    --accent-glow: rgba(255,90,18,0.16);
    --bg-panel: rgba(8,5,14,0.44);
    --border: rgba(255,255,255,0.08);
    --text-primary: #ffffff;
    --text-secondary: rgba(255,255,255,0.52);
    --text-muted: rgba(255,255,255,0.32);
    --blur: blur(8px) saturate(140%);
    --panel-shadow: 0 8px 36px rgba(0,0,0,0.52), inset 0 1px 0 rgba(255,255,255,0.06), inset 0 -1px 0 rgba(0,0,0,0.16);
    --radius: 14px;
    --left-w: 280px;
    --right-w: 260px;
    --bar-h: 76px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #06040e;
    font-family: -apple-system, "Segoe UI Variable", "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    color: var(--text-primary);
    user-select: none;
  }

  /* === THREE.JS CANVAS === */
  #three-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    will-change: transform;
  }

  /* === LIQUID AURA CANVAS === */
  #liquid-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    display: none;
  }

  /* === BACKGROUND VIGNETTE === */
  #bg-gradient {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse 70% 60% at 50% 50%, transparent 30%, rgba(0,0,0,0.55) 100%);
  }

  /* === GLASS PANEL BASE === */
  .panel {
    position: fixed;
    background: var(--bg-panel);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--border);
    box-shadow: var(--panel-shadow);
    z-index: 10;
    overflow: hidden;
    border-radius: var(--radius);
  }

  /* === LEFT PANEL === */
  #left-panel {
    left: 16px;
    top: 16px;
    bottom: calc(var(--bar-h) + 28px);
    width: var(--left-w);
    display: flex;
    flex-direction: column;
  }

  #search-wrap {
    padding: 14px 14px 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #search-wrap .search-input-wrap {
    flex: 1;
  }

  .search-input-wrap {
    position: relative;
  }

  .search-input-wrap .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.4);
    pointer-events: none;
    display: flex;
    align-items: center;
  }

  #search-input {
    width: 100%;
    height: 44px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    color: white;
    font-size: 14px;
    padding: 0 14px 0 38px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s, background 0.2s;
  }

  #search-input::placeholder { color: rgba(255,255,255,0.35); }
  #search-input:focus {
    border-color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.10);
    box-shadow: none;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    padding: 10px 14px 6px;
  }

  #playlist-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 0 0 8px;
  }

  #playlist-wrap::-webkit-scrollbar { width: 4px; }
  #playlist-wrap::-webkit-scrollbar-track { background: transparent; }
  #playlist-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: rgba(255,255,255,0.35);
    font-size: 13px;
  }
  .history-header {
    padding: 12px 14px 4px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.25); text-transform: uppercase;
  }

  .song-item {
    height: 60px;
    padding: 0 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 0.15s;
    position: relative;
  }

  .song-item:hover { background: rgba(255,255,255,0.06); }

  .song-item.active {
    background: rgba(255,255,255,0.08);
  }

  .song-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 3px;
    background: var(--accent);
    border-radius: 0 3px 3px 0;
    box-shadow: 2px 0 12px var(--accent-glow, rgba(255,90,18,0.4));
  }

  .song-item.active .song-name { color: var(--accent); }

  /* Equalizer animation on active song */
  @keyframes eq1 { 0%,100%{height:3px} 40%{height:12px} 70%{height:5px} }
  @keyframes eq2 { 0%,100%{height:8px} 25%{height:2px} 60%{height:13px} }
  @keyframes eq3 { 0%,100%{height:5px} 50%{height:11px} 80%{height:3px} }
  .eq-icon { display:none; align-items:flex-end; gap:2px; height:14px; width:11px; flex-shrink:0; margin-right:2px; }
  .eq-icon span { display:block; width:2.5px; background:var(--accent); border-radius:1px; }
  .eq-icon span:nth-child(1) { height:5px; animation: eq1 0.9s ease-in-out infinite; }
  .eq-icon span:nth-child(2) { height:10px; animation: eq2 0.75s ease-in-out infinite 0.12s; }
  .eq-icon span:nth-child(3) { height:6px; animation: eq3 0.85s ease-in-out infinite 0.24s; }
  .body-playing .song-item.active .eq-icon { display:flex; }
  .body-playing .song-item.active .song-dur { display:none; }

  .song-thumb {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255,255,255,0.08);
  }

  .song-thumb-placeholder {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.25);
  }

  .song-index {
    font-size: 11px;
    color: var(--text-muted);
    min-width: 18px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  .song-info { flex: 1; min-width: 0; }

  .song-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .song-artist {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .song-dur {
    font-size: 11px;
    color: rgba(255,255,255,0.44);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .vip-badge {
    font-size: 10px;
    margin-left: 4px;
    opacity: 0.5;
    vertical-align: middle;
  }

  #status-msg {
    padding: 24px 20px;
    font-size: 13px;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.6;
  }

  #status-msg a {
    color: var(--accent);
    text-decoration: none;
  }

  /* === RIGHT PANEL === */
  #right-panel {
    right: 16px;
    top: 16px;
    bottom: calc(var(--bar-h) + 28px);
    width: var(--right-w);
    display: flex;
    flex-direction: column;
  }

  /* Now playing orbit block */
  #right-orbit-card {
    flex-shrink: 0;
    padding: 18px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  #right-art-wrap {
    width: min(100%, 174px);
    aspect-ratio: 1;
    border-radius: 50%;
    overflow: hidden;
    background: rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    position: relative;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.65),
      0 0 0 1px rgba(255,255,255,0.08),
      0 0 55px var(--accent-glow, rgba(255,90,18,0.15));
    transition: box-shadow 0.08s ease;
  }

  #right-album-art {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 50%;
    animation: vinyl-spin 22s linear infinite;
    animation-play-state: paused;
  }

  @keyframes vinyl-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .body-playing #right-album-art {
    animation-play-state: running;
  }

  #right-art-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    color: rgba(255,255,255,0.2);
  }


  #right-song-title {
    font-size: 18px;
    font-weight: 700;
    color: rgba(255,255,255,0.96);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-top: 16px;
    letter-spacing: -0.02em;
    text-align: center;
  }

  #right-song-artist {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.36);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-top: 6px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-align: center;
  }

  #lyrics-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
    display: flex;
    flex-direction: column;
    margin-top: 10px;
  }

  #lyrics-wrap::-webkit-scrollbar { width: 3px; }
  #lyrics-wrap::-webkit-scrollbar-track { background: transparent; }
  #lyrics-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

  .lyric-line {
    padding: 8px 20px;
    font-size: 13px;
    color: rgba(255,255,255,0.28);
    font-weight: 400;
    line-height: 1.7;
    cursor: pointer;
    transition: color 0.4s, font-size 0.3s, font-weight 0.3s;
    text-align: center;
  }

  .lyric-line.near { color: rgba(255,255,255,0.48); }
  .lyric-line:hover { color: rgba(255,255,255,0.60); }

  .lyric-line.active {
    font-size: 15px;
    color: rgba(255,255,255,0.92);
    font-weight: 700;
    text-shadow: 0 0 28px var(--accent-glow, rgba(122,44,255,0.20));
  }

  .lyric-trans {
    font-size: 11px;
    color: rgba(255,255,255,0.26);
    text-align: center;
    padding: 1px 20px 5px;
    line-height: 1.5;
    transition: color 0.4s;
  }

  .lyric-line.near .lyric-trans { color: rgba(255,255,255,0.32); }
  .lyric-line.active .lyric-trans {
    color: rgba(255,255,255,0.52);
  }

  .song-art-wrap {
    width: 38px; height: 38px;
    border-radius: 8px; overflow: hidden;
    flex-shrink: 0;
    background: rgba(255,255,255,0.08);
  }
  .song-art {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .song-art-placeholder {
    width: 38px; height: 38px;
    border-radius: 8px; flex-shrink: 0;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.2);
  }

  #no-lyrics {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* === BOTTOM BAR === */
  #bottom-bar {
    left: 12px; right: 12px; bottom: 12px;
    width: auto;
    height: var(--bar-h);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 0;
    z-index: 20;
  }

  /* Song info left */
  .bar-song-info {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 240px;
    flex-shrink: 0;
    transition: opacity 0.25s ease;
  }
  .bar-song-info.fade-out { opacity: 0; }

  #bar-art {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    object-fit: cover;
    background: rgba(255,255,255,0.08);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    flex-shrink: 0;
    transition: box-shadow 0.5s;
  }

  .bar-titles { min-width: 0; }
  #bar-title {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: white;
  }
  #bar-artist {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Center controls */
  .bar-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-width: 0;
    padding: 0 20px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s, background 0.15s;
    border-radius: 50%;
    outline: none;
  }

  #btn-prev, #btn-next {
    width: 32px; height: 32px;
    opacity: 0.72;
  }
  #btn-prev:hover, #btn-next:hover { opacity: 1; }

  #btn-play-pause {
    width: 40px; height: 40px;
    background: var(--accent-glow, rgba(122,44,255,0.22));
    border: 1px solid var(--accent, #7a2cff);
    border-radius: 50%;
    color: var(--accent2, #b070ff);
    opacity: 0.90;
  }

  #btn-play-pause:hover { opacity: 1; filter: brightness(1.25); }
  .ctrl-btn:active { transform: scale(0.93); }

  /* Shuffle & Repeat */
  #btn-shuffle, #btn-repeat {
    width: 28px; height: 28px;
    opacity: 0.52;
    position: relative;
    color: rgba(255,255,255,0.7);
    transition: opacity 0.2s, color 0.2s, filter 0.2s;
  }
  #btn-shuffle:hover, #btn-repeat:hover { opacity: 0.75; }
  #btn-shuffle.active, #btn-repeat.active {
    opacity: 1;
    color: var(--accent);
    filter: drop-shadow(0 0 5px var(--accent, rgba(122,44,255,0.55)));
  }
  #btn-repeat.active::after {
    content: '';
    position: absolute;
    bottom: 3px; right: 3px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }
  #btn-repeat.repeat-one::after { content: '1'; width:auto; height:auto; font-size:7px; font-weight:700; bottom:2px; right:1px; background:none; color:var(--accent); }

  .progress-area {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.56);
    font-variant-numeric: tabular-nums;
  }

  #progress-bar-wrap {
    flex: 1;
    height: 20px;
    display: flex;
    align-items: center;
    cursor: pointer;
    position: relative;
  }

  .progress-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    position: relative;
    overflow: visible;
  }

  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent, #7a2cff), var(--accent2, #b070ff));
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
    position: relative;
    box-shadow: 0 0 6px var(--accent-glow, rgba(122,44,255,0.40));
  }

  #progress-fill::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%) scale(0);
    width: 10px; height: 10px;
    background: var(--accent2, #b070ff);
    border-radius: 50%;
    transition: transform 0.15s;
  }

  #progress-bar-wrap:hover #progress-fill::after { transform: translateY(-50%) scale(1); }

  #progress-tooltip {
    position: absolute;
    top: -26px;
    padding: 3px 7px;
    background: rgba(4,3,10,0.88);
    color: var(--accent2, #b070ff);
    border: 1px solid var(--accent-glow, rgba(122,44,255,0.35));
    border-radius: 4px;
    font-size: 11px;
    pointer-events: none;
    transform: translateX(-50%);
    white-space: nowrap;
    z-index: 99;
  }
  #progress-tooltip.hidden { display: none; }

  /* Right controls */
  .bar-right {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 160px;
    flex-shrink: 0;
    justify-content: flex-end;
  }

  .volume-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .vol-icon { color: rgba(255,255,255,0.55); flex-shrink: 0; }

  #volume-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 72px;
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  #volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: white;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  #volume-slider::-moz-range-thumb {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: white;
    cursor: pointer;
    border: none;
  }

  #btn-like {
    width: 28px; height: 28px;
    color: rgba(255,255,255,0.4);
    transition: color 0.2s, transform 0.2s;
    flex-shrink: 0;
  }

  #btn-like.liked { color: #ff4d6a; }
  #btn-like:hover { transform: scale(1.15); }

  /* === THEMES === */
  [data-theme="crimson"] {
    --accent: #ff1a3f; --accent2: #ff607a;
    --accent-glow: rgba(255,26,63,0.20);
    --bg-panel: rgba(10,2,5,0.44); --border: rgba(255,255,255,0.07);
  }
  [data-theme="rose"] {
    --accent: #ff2080; --accent2: #ff70b8;
    --accent-glow: rgba(255,32,128,0.20);
    --bg-panel: rgba(10,1,7,0.44); --border: rgba(255,255,255,0.07);
  }
  [data-theme="violet"] {
    --accent: #8030ff; --accent2: #b070ff;
    --accent-glow: rgba(128,48,255,0.20);
    --bg-panel: rgba(5,2,14,0.44); --border: rgba(255,255,255,0.07);
  }
  [data-theme="blue"] {
    --accent: #1870ff; --accent2: #60a0ff;
    --accent-glow: rgba(24,112,255,0.20);
    --bg-panel: rgba(2,4,14,0.44); --border: rgba(255,255,255,0.07);
  }
  [data-theme="teal"] {
    --accent: #00c8a0; --accent2: #40e8c8;
    --accent-glow: rgba(0,200,160,0.20);
    --bg-panel: rgba(0,7,6,0.44); --border: rgba(255,255,255,0.07);
  }
  [data-theme="green"] {
    --accent: #00c855; --accent2: #40e880;
    --accent-glow: rgba(0,200,85,0.20);
    --bg-panel: rgba(0,7,3,0.44); --border: rgba(255,255,255,0.07);
  }

  /* Theme dots */
  .theme-dots { display:flex; gap:5px; align-items:center; margin-right:4px; }
  .theme-dot {
    width:11px; height:11px; border-radius:50%; cursor:pointer;
    border: 1.5px solid transparent;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    flex-shrink:0;
  }
  .theme-dot[data-theme="mix"] {
    background: conic-gradient(#ff5012, #ff2080, #8030ff, #1870ff, #00c8a0, #00c855, #ffcc00, #ff5012);
  }
  .theme-dot:hover { transform: scale(1.3); }
  .theme-dot.active {
    border-color: rgba(255,255,255,0.75);
    box-shadow: 0 0 7px rgba(255,255,255,0.3);
    transform: scale(1.15);
  }

  /* === SLEEP TIMER & QUEUE === */
  #btn-sleep, #btn-queue {
    width: 28px; height: 28px; opacity: 0.50;
    transition: opacity 0.2s, color 0.2s;
  }
  #btn-sleep:hover, #btn-queue:hover { opacity: 0.85; }
  #btn-sleep { position: relative; }
  #btn-sleep.active, #btn-queue.active { opacity: 1; color: var(--accent); }
  #btn-sleep.active { color: var(--accent); }
  #sleep-indicator {
    position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: var(--accent); white-space: nowrap;
    pointer-events: none; display: none; font-weight: 700; letter-spacing: 0.01em;
  }
  #btn-sleep.active #sleep-indicator { display: block; }
  #btn-visual {
    width: 28px; height: 28px; opacity: 0.62;
    color: rgba(255,255,255,0.74);
    transition: opacity 0.2s, color 0.2s, filter 0.2s;
  }
  #btn-visual:hover,
  #btn-visual.active {
    opacity: 1;
    color: var(--accent);
    filter: drop-shadow(0 0 5px var(--accent, rgba(122,44,255,0.55)));
  }

  #visual-panel {
    position: fixed;
    right: 118px;
    bottom: calc(var(--bar-h) + 18px);
    padding: 4px;
    background: rgba(5,1,10,0.93);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 10px;
    z-index: 70;
    box-shadow: 0 12px 32px rgba(0,0,0,0.58);
    backdrop-filter: blur(12px) saturate(140%);
    -webkit-backdrop-filter: blur(12px) saturate(140%);
    display: flex;
    flex-direction: row;
    gap: 2px;
  }
  #visual-panel.hidden { display: none; }
  .visual-option {
    height: 30px;
    padding: 0 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    border: 0;
    border-radius: 7px;
    background: transparent;
    color: rgba(255,255,255,0.45);
    font: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.18s, color 0.18s;
    letter-spacing: 0.02em;
  }
  .visual-option:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.82); }
  .visual-option.active {
    background: rgba(100,50,200,0.22);
    color: rgba(200,165,255,0.95);
  }
  .visual-option svg {
    width: 13px;
    height: 13px;
    flex-shrink: 0;
    opacity: 0.80;
  }

  /* === QUEUE PANEL === */
  #queue-panel {
    position: fixed;
    bottom: calc(var(--bar-h) + 16px);
    left: calc(var(--left-w) + 32px);
    right: calc(var(--right-w) + 32px);
    max-height: 340px;
    background: rgba(4, 2, 8, 0.96);
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    border: 1px solid var(--accent-glow);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    z-index: 50;
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.28s;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.55), 0 4px 24px rgba(0,0,0,0.4);
  }
  #queue-panel.hidden { transform: translateY(16px); opacity: 0; pointer-events: none; }
  .queue-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 16px 9px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .queue-header span { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.80); letter-spacing: 0.06em; text-transform: uppercase; }
  #queue-close { background: none; border: none; color: rgba(255,255,255,0.30); font-size: 20px; cursor: pointer; line-height: 1; padding: 0 2px; transition: color 0.15s; }
  #queue-close:hover { color: rgba(255,255,255,0.80); }
  #queue-list { overflow-y: auto; flex: 1; padding: 4px 0; }
  #queue-list::-webkit-scrollbar { width: 3px; }
  #queue-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 2px; }
  .queue-item {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 16px; cursor: pointer; transition: background 0.12s;
  }
  .queue-item:hover { background: rgba(255,255,255,0.04); }
  .queue-item.current { background: var(--accent-glow); }
  .queue-item .q-num { width: 22px; text-align: right; font-size: 11px; color: rgba(255,255,255,0.20); flex-shrink: 0; }
  .queue-item.current .q-num { color: var(--accent); font-size: 9px; }
  .queue-item .q-name { flex: 1; font-size: 12px; color: rgba(255,255,255,0.78); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-item.current .q-name { color: var(--accent2); font-weight: 500; }
  .queue-item .q-artist { font-size: 11px; color: rgba(255,255,255,0.26); white-space: nowrap; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .queue-item .q-dur { font-size: 11px; color: rgba(255,255,255,0.18); flex-shrink: 0; width: 34px; text-align: right; }

  /* === LOADING SPINNER === */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (prefers-reduced-motion: reduce) {
    .body-playing #right-album-art,
    .spinner,
    .eq-icon span,
    .eq-bar {
      animation: none !important;
    }
  }

  @media (max-width: 760px) {
    :root {
      --left-w: calc(100vw - 24px);
      --right-w: calc(100vw - 24px);
    }

    #left-panel {
      left: 12px;
      right: 12px;
      top: 12px;
      bottom: auto;
      width: auto;
      height: 92px;
    }

    #search-wrap { padding: 12px; }
    #panel-tabs,
    #playlist-wrap,
    #mylist-wrap { display: none !important; }

    #right-panel {
      left: 12px;
      right: 12px;
      top: 116px;
      bottom: calc(var(--bar-h) + 24px);
      width: auto;
    }

    #right-orbit-card { padding: 14px 16px 12px; }
    #right-art-wrap { width: min(42vw, 150px); }
    #right-song-title { font-size: 17px; padding-top: 12px; }
    #right-song-artist { font-size: 9px; }
    #right-metrics { padding: 8px 16px 10px; }
    .lyric-line { padding-left: 16px; padding-right: 16px; }

    #bottom-bar {
      left: 12px;
      right: 12px;
      height: var(--bar-h);
      padding: 0 10px;
    }

    .bar-song-info {
      width: 98px;
      gap: 8px;
    }

    #bar-art-wrap {
      width: 40px !important;
      height: 40px !important;
      border-radius: 8px !important;
    }

    #bar-title { font-size: 12px; }
    #bar-artist { font-size: 10px; }
    .bar-center { padding: 0 8px; gap: 5px; }
    .controls { gap: 12px; }
    #btn-shuffle,
    #btn-repeat { display: none; }
    .progress-area { gap: 6px; font-size: 10px; }

    .bar-right {
      width: 96px;
      gap: 6px;
    }

    .theme-dots,
    .volume-wrap,
    #btn-sleep { display: none; }
  }

  /* === TOAST === */
  #toast {
    position: fixed;
    bottom: calc(var(--bar-h) + 20px);
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(18,5,0,0.92);
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.12);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* equalizer bars animation for active song */
  .eq-bars {
    display: inline-flex;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
    flex-shrink: 0;
  }

  .eq-bar {
    width: 3px;
    background: var(--accent);
    border-radius: 1px;
    animation: eq-bounce 0.8s ease-in-out infinite alternate;
  }

  .eq-bar:nth-child(2) { animation-delay: 0.15s; }
  .eq-bar:nth-child(3) { animation-delay: 0.3s; }

  @keyframes eq-bounce {
    from { height: 3px; }
    to { height: 14px; }
  }

  /* ── Login button ── */
  #login-btn {
    flex-shrink: 0;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: rgba(255,255,255,0.55);
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  #login-btn:hover { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.9); }
  #login-btn.logged-in { color: #4cde80; border-color: rgba(76,222,128,0.35); }

  /* ── Panel tabs (搜索结果 / 我的歌单) ── */
  #panel-tabs {
    flex-shrink: 0;
    padding: 6px 12px 0;
    gap: 4px;
    display: flex;
  }
  #panel-tabs.hidden { display: none !important; }
  .panel-tab {
    flex: 1;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    padding: 5px 0 6px;
    cursor: pointer;
    text-align: center;
    letter-spacing: 0.04em;
    transition: color 0.15s, border-color 0.15s;
  }
  .panel-tab:hover { color: rgba(255,255,255,0.7); }
  .panel-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

  /* ── My playlists panel ── */
  #mylist-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 0 0 8px;
    display: none;
  }
  #mylist-wrap::-webkit-scrollbar { width: 4px; }
  #mylist-wrap::-webkit-scrollbar-track { background: transparent; }
  #mylist-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  .my-playlist-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 6px;
    margin: 1px 6px;
    transition: background 0.15s;
  }
  .my-playlist-item:hover { background: rgba(255,255,255,0.06); }
  .my-playlist-item.active { background: var(--accent-glow); }
  .my-playlist-item .pl-icon {
    width: 32px; height: 32px; border-radius: 6px;
    background: rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: rgba(255,255,255,0.3); font-size: 13px;
    overflow: hidden;
  }
  .my-playlist-item .pl-icon img { width: 100%; height: 100%; object-fit: cover; }
  .my-playlist-item .pl-info { flex: 1; min-width: 0; }
  .my-playlist-item .pl-name {
    font-size: 12px; color: rgba(255,255,255,0.82);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .my-playlist-item .pl-count { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 1px; }
  #back-to-playlists {
    display: none; align-items: center; gap: 6px;
    padding: 8px 14px 4px;
    font-size: 11px; color: var(--accent);
    cursor: pointer; background: none; border: none;
    opacity: 0.85;
  }
  #back-to-playlists:hover { opacity: 1; color: var(--accent2); }

  /* ── Login modal ── */
  #qr-modal {
    position: fixed; inset: 0; z-index: 990;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(7px) saturate(140%);
    display: flex; align-items: center; justify-content: center;
  }
  #qr-modal.hidden { display: none; }
  #qr-box {
    background: rgba(15,4,0,0.97);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 24px;
    padding: 32px 40px 28px;
    text-align: center;
    width: 280px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }
  #qr-box h3 { margin: 0 0 16px; font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.9); }
  #qr-box p  { margin: 0 0 16px; font-size: 12px; color: rgba(255,255,255,0.4); }
  /* Tab switcher */
  .login-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .login-tab {
    flex: 1; padding: 7px 0; font-size: 12px; font-weight: 500;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: rgba(255,255,255,0.45); cursor: pointer; transition: all 0.2s;
  }
  .login-tab.active {
    background: rgba(255,90,18,0.18); border-color: rgba(255,90,18,0.45); color: #ff9a3d;
  }
  /* QR section */
  #qr-img { width: 190px; height: 190px; border-radius: 14px; display: block; margin: 0 auto; }
  #qr-status { margin: 14px 0 20px; font-size: 13px; color: rgba(255,255,255,0.55); min-height: 18px; }
  /* Phone section */
  #phone-section { display: none; }
  .login-field {
    width: 100%; padding: 10px 12px; margin-bottom: 10px; box-sizing: border-box;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.13);
    border-radius: 10px; color: rgba(255,255,255,0.9); font-size: 13px; outline: none;
  }
  .login-field:focus { border-color: rgba(255,90,18,0.55); }
  .login-field::placeholder { color: rgba(255,255,255,0.28); }
  #phone-submit {
    width: 100%; padding: 10px; margin-top: 2px;
    background: linear-gradient(to right, #8a1f00, #ff5a12);
    border: none; border-radius: 10px; color: white;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  }
  #phone-submit:hover { opacity: 0.88; }
  #phone-status { margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.45); min-height: 16px; }
  /* Shared close button */
  #qr-close {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: rgba(255,255,255,0.6); font-size: 13px;
    padding: 8px 24px; cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  #qr-close:hover { background: rgba(255,255,255,0.15); color: white; }

  /* === MINI EQ === */
  #right-metrics {
    padding: 10px 20px 14px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .mini-eq-bar {
    height: 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 1px;
    overflow: hidden;
  }
  .metric-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    opacity: 0.45;
    border-radius: 1px;
    transition: width 0.06s linear;
  }

  /* === TITLE BAR DRAG STRIP (hiddenInset window needs an explicit drag region) === */
  #titlebar-drag {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 30px;
    z-index: 900;               /* above canvases/panels, below modals (#qr-modal is higher) */
    -webkit-app-region: drag;
  }
</style>
</head>
<body>

<!-- hiddenInset title bar: this strip is the window's drag handle -->
<div id="titlebar-drag"></div>

<canvas id="three-canvas"></canvas>
<canvas id="liquid-canvas"></canvas>
<div id="bg-gradient"></div>

<!-- LEFT PANEL -->
<div class="panel" id="left-panel">
  <div id="search-wrap">
    <div class="search-input-wrap">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5.5" cy="5.5" r="4"/><line x1="9" y1="9" x2="13" y2="13"/></svg>
      </span>
      <input type="text" id="search-input" placeholder="搜索歌曲、歌手..." autocomplete="off" spellcheck="false">
    </div>
    <button id="login-btn" title="登录网易云账号可解锁更多歌曲">登录</button>
  </div>
  <div id="panel-tabs" class="hidden">
    <button class="panel-tab active" id="tab-search">搜索结果</button>
    <button class="panel-tab" id="tab-mylist">我的歌单</button>
  </div>
  <div id="playlist-wrap">
    <div id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" style="color:rgba(255,255,255,0.12)"><path d="M9 3v12.5A4 4 0 105 19V9l10-2v8.5A4 4 0 1011 19V7L9 3z"/></svg>
      <span>搜索你喜欢的音乐</span>
    </div>
  </div>
  <div id="mylist-wrap">
    <button id="back-to-playlists" style="display:none">← 返回歌单列表</button>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="panel" id="right-panel">
  <div id="right-orbit-card">
    <div id="right-art-wrap">
      <img id="right-album-art" src="" alt="" style="display:none">
      <div id="right-art-placeholder">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="rgba(255,255,255,0.17)"><path d="M9 3v12.5A4 4 0 105 19V9l10-2v8.5A4 4 0 1011 19V7L9 3z"/></svg>
      </div>
    </div>
    <div id="right-song-title">Nebula</div>
    <div id="right-song-artist">Idle Orbit</div>
  </div>

  <!-- Mini EQ -->
  <div id="right-metrics">
    <div class="mini-eq-bar"><div class="metric-bar" id="m-bass"></div></div>
    <div class="mini-eq-bar"><div class="metric-bar" id="m-mid"></div></div>
    <div class="mini-eq-bar"><div class="metric-bar" id="m-high"></div></div>
    <div class="mini-eq-bar"><div class="metric-bar" id="m-energy"></div></div>
    <span id="mv-bass" style="display:none"></span>
    <span id="mv-mid" style="display:none"></span>
    <span id="mv-high" style="display:none"></span>
    <span id="mv-energy" style="display:none"></span>
    <span id="beat-led" style="display:none"></span>
  </div>

  <div id="lyrics-wrap">
    <div id="no-lyrics">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
      <span>暂无歌词</span>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="panel" id="bottom-bar">
  <!-- Song info -->
  <div class="bar-song-info">
    <div id="bar-art-wrap" style="width:52px;height:52px;border-radius:10px;background:rgba(255,255,255,0.07);flex-shrink:0;position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.5);">
      <img id="bar-art" src="" alt="" style="width:100%;height:100%;object-fit:cover;display:none;position:absolute;inset:0;">
      <div id="bar-art-placeholder" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="rgba(255,255,255,0.18)"><path d="M9 3v12.5A4 4 0 105 19V9l10-2v8.5A4 4 0 1011 19V7L9 3z"/></svg>
      </div>
    </div>
    <div class="bar-titles">
      <div id="bar-title">未播放</div>
      <div id="bar-artist">—</div>
    </div>
  </div>

  <!-- Center: controls + progress -->
  <div class="bar-center">
    <div class="controls">
      <button class="ctrl-btn" id="btn-shuffle" title="随机播放">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-prev" title="上一首">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M2 2h2v10H2zm2 5L12 2v10L4 7z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-play-pause" title="播放/暂停">
        <svg id="icon-play" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2.5l10 5.5-10 5.5V2.5z"/></svg>
        <svg id="icon-pause" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:none"><rect x="3" y="2" width="4" height="12" rx="1"/><rect x="9" y="2" width="4" height="12" rx="1"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-next" title="下一首">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M12 2h-2v10h2zm-2 5L2 2v10l8-5z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-repeat" title="循环模式">
        <svg id="icon-repeat-all" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
        <svg id="icon-repeat-one" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/><line x1="11" y1="9" x2="11" y2="15"/></svg>
      </button>
    </div>
    <div class="progress-area">
      <span id="time-current">0:00</span>
      <div id="progress-bar-wrap">
        <div class="progress-track">
          <div id="progress-fill"></div>
        </div>
        <div id="progress-tooltip" class="hidden"></div>
      </div>
      <span id="time-total">0:00</span>
    </div>
  </div>

  <!-- Right: theme + volume + like -->

<!-- crossorigin is REQUIRED: without it the cross-origin media stream taints
     the Web Audio graph and the analyser reads all-zero — music plays but every
     visualization goes deaf. NetEase CDN sends ACAO:* so this is safe. -->
<audio id="audio" preload="auto" crossorigin="anonymous"></audio>

<script type="module">
// ===================================================================
// THREE.JS IMPORTS
// ===================================================================
// Vendored locally — a CDN import here meant the packaged app was fully
// broken offline (this module holds ALL app logic, not just the visuals).
import * as THREE from './vendor/three.module.js';

// ===================================================================
// SCENE SETUP
// ===================================================================
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: true,
  powerPreference: 'high-performance',
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.4));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x03050e, 1);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;  // compensate for ACES darkening; keeps glow sphere vivid
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x060b18, 18, 55);

const camera = new THREE.PerspectiveCamera(64, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.2, 4.2);
camera.lookAt(0, 0.0, -1.5);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.4));
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===================================================================
// SHADERS
// ===================================================================
const vertexShader = `
  uniform float uTime;
  uniform float uAudioLevel;
  uniform float uBass;
  uniform float uMid;
  uniform float uHigh;
  uniform float uBeatFlash;

  varying vec3 vNormal;
  varying vec3 vPosition;
  varying float vDisplacement;

  // 3D simplex-like noise (compact version)
  vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
  vec4 mod289(vec4 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
  vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
  vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

  float snoise(vec3 v) {
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i  = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(
      i.z + vec4(0.0, i1.z, i2.z, 1.0))
      + i.y + vec4(0.0, i1.y, i2.y, 1.0))
      + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * ns.x + ns.yyyy;
    vec4 y = y_ * ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0)*2.0 + 1.0;
    vec4 s1 = floor(b1)*2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
    vec3 p0 = vec3(a0.xy,h.x);
    vec3 p1 = vec3(a0.zw,h.y);
    vec3 p2 = vec3(a1.xy,h.z);
    vec3 p3 = vec3(a1.zw,h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)), 0.0);
    m = m * m;
    return 42.0 * dot(m*m, vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
  }

  void main() {
    // World-space normal and position for correct Fresnel in fragment shader
    vNormal = normalize(mat3(modelMatrix) * normal);

    // Three octaves — time speed surges on beat for a "pulse through the skin" feel
    float beatTimeBoost = 1.0 + uBeatFlash * 1.6;
    // Domain warp: distort noise input with a low-freq sample; breaks icosahedron grid artifacts
    float warpN = snoise(position * 0.65 + uTime * 0.035);
    vec3 warpedPos = position + vec3(warpN * 0.16, warpN * -0.13, warpN * 0.11);
    float n1 = snoise(warpedPos * 1.3 + uTime * 0.12 * beatTimeBoost);
    float n2amp = 0.45 + uMid * 0.18;
    float n2 = snoise(warpedPos * 2.2 - uTime * 0.07 * beatTimeBoost) * n2amp;
    float n3 = snoise(warpedPos * 3.8 + uTime * 0.10) * (0.20 + uHigh * 0.14);
    float noise = n1 + n2 + n3;

    // Frequency topology: bass energy concentrated near poles, treble along equator
    float poleAxis = abs(normalize(position).y);
    float equAxis  = 1.0 - poleAxis;
    // Surface rule (user request): quiet music = smooth round ball; drum hits =
    // spikes pop out with amplitude tied to the FIRST bar (bass), punched
    // briefly harder on each detected beat. Radius breathing stays in JS sScale.
    float windSpeed = 0.16 + uAudioLevel * 0.10;
    float windAngle = uTime * 0.04;
    float windDrift = sin(position.x * cos(windAngle) * 2.1 + position.z * sin(windAngle) * 1.8 + uTime * windSpeed) * 0.007
                    + sin(position.y * 1.8 + uTime * windSpeed * 0.72) * 0.005;
    float idleBreath = sin(uTime * 0.35 + position.x * 0.9) * 0.016 + sin(uTime * 0.61 + position.z * 1.1 + 1.7) * 0.012;
    float spikeAmp = uBass * 0.105 + uBeatFlash * 0.115;
    float displacement = noise * (0.030 + spikeAmp)
                       + abs(snoise(position * 5.5 + uTime * 0.16)) * uHigh * (0.006 + equAxis * 0.004)
                       + windDrift + idleBreath;

    vDisplacement = displacement;

    // Q3 fix: pass DISPLACED world position so Fresnel uses actual surface point
    vec3 displaced = position + normal * displacement;
    vPosition = (modelMatrix * vec4(displaced, 1.0)).xyz;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
  }
`;

const fragmentShader = `
  uniform vec3 uColor1;
  uniform vec3 uColor2;
  uniform float uAudioLevel;
  uniform float uBass;
  uniform float uMid;
  uniform float uHigh;
  uniform float uBeatFlash;
  uniform float uFlux;
  uniform float uTime;

  varying vec3 vNormal;
  varying vec3 vPosition;
  varying float vDisplacement;

  float hash31(vec3 p) { return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453); }

  void main() {
    vec3 viewDir = normalize(cameraPosition - vPosition);
    float signedNdotV = dot(normalize(vNormal), viewDir);
    float NdotV  = abs(signedNdotV);
    // Fresnel width expands with bass/mid/beat — rim grows wider on heavy music
    float fresnelExp = 3.5 - uBass * 0.9 - uMid * 0.30 - uHigh * 0.18 - uBeatFlash * 0.5;
    float fresnel = pow(1.0 - NdotV, max(fresnelExp, 1.6));
    float depthFade = clamp(signedNdotV * 2.5 + 1.0, 0.08, 1.0);
    float edgeFactor = clamp(fresnel * (0.8 + uBass * 3.6 + uAudioLevel * 1.6 + uBeatFlash * 2.2), 0.0, 1.0);
    float spikeFactor = clamp(vDisplacement * 1.1, 0.0, 1.0);
    // Interior reacts to bass — more of uColor2 as energy rises
    float baseBlend = 0.30 + uBass * 0.12 + uMid * 0.06 + uBeatFlash * 0.06;
    vec3 col = mix(uColor1, uColor2, max(max(edgeFactor, spikeFactor), baseBlend));
    // Color temperature — bass shifts cool-violet, treble stays bright
    float tempBias = clamp((uBass - uHigh) * 1.5, -0.8, 0.8);
    col *= mix(vec3(1.04, 1.00, 0.96), vec3(0.97, 0.99, 1.05), tempBias * 0.5 + 0.5);
    // Back-face cool gradient — back hemisphere shifts slightly cooler
    float backFactor = clamp(-signedNdotV, 0.0, 1.0);
    col = mix(col, col * vec3(0.93, 0.97, 1.08), backFactor * 0.25);
    float brightness = 0.78 + uAudioLevel * 0.18 + uBass * 0.22 + uMid * 0.08 + uBeatFlash * 0.28 + uFlux * 0.10;
    col *= brightness;
    // Subtle center vignette — darkens sphere center slightly for painted-sphere depth
    col *= (1.0 - pow(NdotV, 4.5) * 0.07);
    // Surface shimmer — animated light bands; frequency rises with audio energy
    float shimFreq = 2.1 + uAudioLevel * 1.8 + uBass * 1.2;
    float shimmer = sin(uTime * shimFreq + vPosition.y * 3.8 + vPosition.x * 2.6) * (0.03 + uAudioLevel * 0.02 + uHigh * 0.014 + uFlux * 0.016) + 1.0;
    float shimmer2 = sin(uTime * (5.8 + uHigh * 3.2) + vPosition.z * 4.2 + vPosition.x * 1.8 + uBeatFlash * 1.6) * (0.014 + uHigh * 0.012) + 1.0;
    col *= shimmer * shimmer2;
    // Center highlight — facing surface catches ambient light regardless of audio
    float centerBase = pow(NdotV, 5.5) * (0.07 + uMid * 0.04);
    col += col * centerBase;
    // Bass center pulse — inner hemisphere brightens on heavy bass hits
    float centerPulse = pow(NdotV, 3.5) * uBass * 0.22;
    col += col * centerPulse;
    // Mid-frequency ring waves — scroll speed and phase surge with mid energy and beat
    float ringSpeed = 3.2 + uMid * 4.0 + uBeatFlash * 6.0 + uFlux * 3.5;
    float ringWave = sin(vPosition.y * 5.5 - uTime * ringSpeed + uBeatFlash * 2.8 + uFlux * 1.2) * 0.5 + 0.5;
    col = mix(col, col * (1.0 + ringWave * 0.22) + (uColor2 - col) * ringWave * 0.06, uMid * 0.85);
    // Second ring wave — perpendicular axis (X) at lower amplitude for cross-hatched shimmer
    float ringWave2 = sin(vPosition.x * 4.2 - uTime * (2.8 + uBass * 3.5) + uBeatFlash * 1.4 + uFlux * 0.9) * 0.5 + 0.5;
    col = mix(col, col * (1.0 + ringWave2 * 0.12), uMid * 0.35);
    // Displacement tip — spike tips shift cooler/violet
    float dispGlow = clamp(vDisplacement * 2.8, 0.0, 1.0);
    col = mix(col, col * vec3(0.92, 0.96, 1.12), dispGlow * (0.25 + uBeatFlash * 0.10));
    // Spike tip emission — highest displacement points emit cool violet like plasma jets
    float spikeTip = smoothstep(0.72, 1.0, vDisplacement);
    col += vec3(1.0, 0.7, 2.2) * spikeTip * (0.12 + uBass * 0.08 + uBeatFlash * 0.06) * depthFade;
    // Spike tip saturation boost — extreme deformations bloom into vivid saturated color
    float tipLuma = dot(col, vec3(0.299, 0.587, 0.114));
    col = mix(col, mix(vec3(tipLuma), col, 1.22), spikeTip * (0.28 + uBass * 0.18));
    // Mid-frequency cool shift: mids push slightly violet
    col = mix(col, col * vec3(0.95, 0.99, 1.08), uMid * 0.30);
    // Treble cool accent: high frequencies add a touch of cool brightness
    col = mix(col, col * vec3(0.96, 1.02, 1.10), uHigh * 0.30);
    // Saturation boost proportional to bass — pull away from gray axis
    float luma = dot(col, vec3(0.299, 0.587, 0.114));
    col = mix(vec3(luma), col, 1.0 + uBass * 0.28 + uBeatFlash * 0.12);
    // Beat contrast boost — briefly deepens shadows and lifts highlights for punchy transients
    float beatLuma = dot(col, vec3(0.299, 0.587, 0.114));
    col = mix(col, mix(vec3(beatLuma), col, 1.0 + uBeatFlash * 0.18), uBeatFlash * 0.55);
    // Peak-beat global surge: brief full-sphere brightness pop at maximum beat impact
    col *= 1.0 + smoothstep(0.42, 0.65, uBeatFlash) * 0.28;
    // Altitude gradient — cool blue-white at crown, warm amber at base, like a planet atmosphere
    float altitude = normalize(vPosition).y;
    col = mix(col, col * vec3(0.89, 0.95, 1.16), smoothstep(0.25, 1.0, altitude) * 0.20);
    col = mix(col, col * vec3(0.90, 0.95, 1.14), smoothstep(-0.25, -1.0, altitude) * 0.20);
    // Latitudinal bands — slow-drifting horizontal stripes like gas-giant cloud belts
    float band1 = sin(altitude * 6.0 + uTime * 0.14) * 0.5 + 0.5;
    float band2 = sin(altitude * 10.5 - uTime * 0.09 + uBass * 1.5) * 0.5 + 0.5;
    col = mix(col, col * (0.92 + band1 * 0.16) + uColor1 * band1 * 0.04, uMid * 0.35);
    col = mix(col, col * (0.94 + band2 * 0.12) + uColor2 * band2 * 0.03, uBass * 0.28);
    // Polar cap glow — top catches album secondary, base catches primary (like a two-tone planet)
    float topCap = smoothstep(0.68, 1.0, altitude);
    float botCap = smoothstep(-0.68, -1.0, altitude);
    col += uColor2 * topCap * (0.14 + uBass * 0.10 + uBeatFlash * 0.08) * depthFade;
    col += uColor1 * botCap * (0.11 + uMid * 0.08 + uBeatFlash * 0.06) * depthFade;
    // Beat-driven pole burst — brief white flash at crown and base marks every hit
    col += vec3(1.8, 1.7, 2.1) * topCap * uBeatFlash * 0.28 * depthFade;
    col += vec3(1.4, 1.2, 2.2) * botCap * uBeatFlash * 0.18 * depthFade;
    // Dual specular: warm key light above-right + cool fill light lower-left
    vec3 lightDir = normalize(vec3(0.6, 1.4, 1.2));
    float spec = pow(max(0.0, dot(reflect(-lightDir, normalize(vNormal)), viewDir)), 10.0);
    // Cool violet specular, beats shift toward bright neutral
    vec3 specColor = mix(vec3(0.8, 0.65, 1.3), vec3(1.3, 1.2, 1.5), uBeatFlash * 0.60);
    col += specColor * spec * (0.18 + uBass * 0.20 + uBeatFlash * 0.15 + uFlux * 0.10);
    // Rim light from key — back-lit silhouette edge catches warm key light
    float rimLight = pow(max(0.0, 1.0 - dot(normalize(vNormal), lightDir)), 4.2);
    col += uColor2 * rimLight * (0.09 + uBass * 0.07 + uBeatFlash * 0.05) * depthFade;
    vec3 lightDir2 = normalize(vec3(-0.7, 0.4, 0.8));
    float spec2 = pow(max(0.0, dot(reflect(-lightDir2, normalize(vNormal)), viewDir)), 18.0);
    col += vec3(0.65, 0.80, 1.20) * spec2 * (0.12 + uHigh * 0.18);
    // Up-light from below — stage footlight feel; uses album primary color
    vec3 lightDir3 = normalize(vec3(0.0, -1.2, 0.8));
    float spec3 = pow(max(0.0, dot(reflect(-lightDir3, normalize(vNormal)), viewDir)), 22.0);
    col += uColor1 * spec3 * (0.07 + uMid * 0.08 + uBeatFlash * 0.06);
    // Gloss highlight — overhead environment reflection, strongest at center top
    float gloss = pow(max(0.0, dot(viewDir, vec3(0.0, 1.0, 0.5))), 18.0) * (0.5 + uAudioLevel * 0.4);
    vec3 glossCol = mix(vec3(0.88, 0.93, 1.0), vec3(0.90, 0.92, 1.0), uBass * 0.55);
    col += glossCol * gloss * 0.09;
    // Brushed metal tangent shimmer — anisotropic highlight across surface latitude lines
    vec3 tangent = normalize(cross(normalize(vNormal), vec3(0.0, 1.0, 0.0001)));
    float brushed = pow(abs(dot(tangent, viewDir)), 3.5) * (0.5 + uBass * 0.4 + uBeatFlash * 0.3);
    col += vec3(0.92, 0.96, 1.0) * brushed * 0.07;
    // Equatorial atmosphere belt — mid-frequency luminance band hugging the equator
    float equatorBelt = pow(1.0 - abs(normalize(vPosition).y), 5.0);
    col += uColor2 * equatorBelt * (0.07 + uMid * 0.09 + uBass * 0.06 + uFlux * 0.07) * depthFade;
    // Micro surface cells — fine hash pattern adds tactile detail to surface texture
    float cellHash = hash31(floor(vPosition * 26.0));
    col += col * step(0.90, cellHash) * (0.025 + uHigh * 0.035);
    // Core swell — front-facing center blooms with album secondary color on heavy bass
    float coreSwell = pow(NdotV, 1.8) * uBass * uBass * 0.28;
    col += uColor2 * coreSwell * depthFade;
    // Diagonal surface flow — interference pattern of two sinusoids creates flowing swirl
    float flow = sin(vPosition.x * 3.2 + altitude * 7.0 + uTime * 0.35) * cos(vPosition.z * 2.8 - altitude * 5.5 - uTime * 0.28);
    col = mix(col, col + uColor2 * 0.10, (flow * 0.5 + 0.5) * uMid * 0.20);
    // UV triplet — three-way interference gives Moire-like surface texture
    float uv3 = sin(vPosition.x * 5.2 + uTime * 1.1 + uBass * 2.8)
              * sin(vPosition.y * 4.0 - uTime * 0.75 + uMid * 2.0)
              * sin(vPosition.z * 3.8 + uTime * 0.6 + uHigh * 1.5);
    col = mix(col, col + uColor1 * 0.08, (uv3 * 0.5 + 0.5) * uBass * 0.22);
    // Torus-knot surface pattern — p=2,q=3 frequency mix responds to high-freq content
    float tkPat = sin(vPosition.x * 2.0 + uTime * 0.20 + uBass * 1.2)
                * cos(vPosition.y * 3.0 - uTime * 0.15 + uMid * 1.0)
                * sin(vPosition.z * 2.5 + uTime * 0.10 + uHigh * 1.4);
    col = mix(col, col + uColor1 * 0.10, (tkPat * 0.5 + 0.5) * uHigh * 0.22);
    // Pressure ripple — displacement-modulated expanding rings visible on beat
    float pRipple = sin(vDisplacement * 18.0 - uTime * 8.5 + uBeatFlash * 11.0) * 0.5 + 0.5;
    float pRippleGate = smoothstep(0.55, 0.88, pRipple) * uBeatFlash;
    col += uColor2 * pRippleGate * (0.18 + uBass * 0.08) * depthFade;
    // Subsurface scatter simulation — sphere edges glow with album color as if back-lit
    float backLight = clamp(1.0 - dot(normalize(vNormal), lightDir), 0.0, 1.0);
    float sss = pow(backLight * (1.0 - NdotV * 0.7), 2.2);
    col = mix(col, uColor2 * 1.0, sss * (0.08 + uBass * 0.05 + uMid * 0.03 + uBeatFlash * 0.04 + uFlux * 0.04));
    // Secondary SSS — warm up-light scattering through the sphere base gives dual-lit depth
    float backLight2 = clamp(1.0 - dot(normalize(vNormal), lightDir3), 0.0, 1.0);
    float sss2 = pow(backLight2 * (1.0 - NdotV * 0.6), 2.5);
    col = mix(col, uColor1 * 1.5, sss2 * (0.06 + uMid * 0.04 + uBeatFlash * 0.03));
    // Violet shimmer — bass-driven chromatic shift along Y axis
    float heatShift = sin(vPosition.y * 8.0 + uTime * 4.5 + uBass * 2.8) * 0.008 * uBass;
    col.b += heatShift;
    col.r -= heatShift * 0.35;
    // Surface veins — displacement-modulated lines give skin-like organic texture
    float veinEdge = 0.94 - uMid * 0.06 - uBass * 0.04; // narrower/sharper veins on heavy sections
    float veinFactor = smoothstep(0.78, veinEdge, abs(sin(vDisplacement * 11.0 + uTime * 0.25 + uBass * 2.2)));
    col += uColor1 * veinFactor * (0.07 + uMid * 0.08 + uBass * 0.06 + uFlux * 0.07) * depthFade;
    // Second vein layer — finer scale responds to high-frequency shimmer
    float veinEdge2 = 0.96 - uHigh * 0.05;
    float veinFactor2 = smoothstep(0.84, veinEdge2, abs(sin(vDisplacement * 21.0 + uTime * 0.38 + uHigh * 1.8)));
    col += uColor2 * veinFactor2 * (0.04 + uHigh * 0.055) * depthFade;
    // High-frequency surface sparkle — density and intensity increase on strong beats
    float sparkleThresh = 0.970 - uBeatFlash * 0.025 - uHigh * 0.015;
    float sparkle = step(sparkleThresh, hash31(floor(vPosition * 14.0 + vec3(uTime * 0.15, uTime * 0.28, uTime * 0.10)))) * uHigh * uHigh;
    vec3 sparkleCol = mix(vec3(1.2, 1.1, 1.6), uColor2 * 2.0, 0.45);
    col += sparkleCol * sparkle * (0.28 + uBeatFlash * 0.22) * depthFade;
    // Secondary sparkle — coarser scale, mid-frequency driven, adds glitter-ball texture
    float sparkleThresh2 = 0.958 - uBeatFlash * 0.018 - uMid * 0.014;
    float sparkle2 = step(sparkleThresh2, hash31(floor(vPosition * 7.0 + vec3(uTime * 0.08, uTime * 0.14, uTime * 0.06)))) * uMid * uMid;
    col += mix(vec3(0.9, 0.8, 1.5), uColor1 * 1.8, 0.5) * sparkle2 * (0.14 + uBeatFlash * 0.10) * depthFade;
    // Polar aurora — wavy chromatic bands near poles, respond to high-frequency content
    float auroraLat = smoothstep(0.58, 0.84, abs(altitude));
    float aurora = (sin(vPosition.x * 4.2 + uTime * 0.9) * 0.5 + 0.5) * (sin(vPosition.z * 3.5 + uTime * 0.6) * 0.5 + 0.5);
    float auroraPhase = uTime * 0.28 + uHigh * 2.5;
    vec3 auroraCol = vec3(sin(auroraPhase)*0.5+0.5, sin(auroraPhase+2.094)*0.5+0.5, sin(auroraPhase+4.189)*0.5+0.5);
    col = mix(col, col + auroraCol * (0.10 + uBass * 0.05), auroraLat * aurora * (0.06 + uHigh * 0.10) * depthFade);
    // Thin-film iridescence — rainbow shimmer at Fresnel edges, cycles gently with time
    float iridPhase = NdotV * 2.8 + uTime * (0.06 + uBeatFlash * 0.28 + uFlux * 0.18);
    vec3 iridCol = vec3(sin(iridPhase) * 0.5 + 0.5, sin(iridPhase + 2.094) * 0.5 + 0.5, sin(iridPhase + 4.189) * 0.5 + 0.5);
    col = mix(col, col + iridCol * 0.12, fresnel * (0.05 + uBass * 0.03 + uBeatFlash * 0.03 + uFlux * 0.04));
    // Second iridescence layer — finer scale, high-frequency response
    float iridPhase2 = NdotV * 5.5 + uTime * 0.14 + uBeatFlash * 2.8;
    vec3 iridCol2 = vec3(sin(iridPhase2)*0.5+0.5, sin(iridPhase2+2.094)*0.5+0.5, sin(iridPhase2+4.189)*0.5+0.5);
    col = mix(col, col + iridCol2 * 0.07, fresnel * (0.02 + uHigh * 0.04 + uBeatFlash * 0.04 + uFlux * 0.03));
    // Violet fringe — animated violet shift at silhouette
    float fringePhase = uTime * 0.8 + uBeatFlash * 2.0;
    float fringe = smoothstep(0.55, 0.90, fresnel) * (0.3 + uBass * 0.3 + uFlux * 0.4);
    col.b += fringe * (0.10 + sin(fringePhase) * 0.04);
    col.r -= fringe * (0.06 + cos(fringePhase * 1.3) * 0.02);
    col.g += fringe * (0.02 + sin(fringePhase * 0.7 + 1.2) * 0.01);

    // White-hot corona — extreme silhouette rim bleeds toward hot white for sun-like glow
    float hotRim = pow(fresnel, 4.2) * (0.5 + uBass * 0.6 + uBeatFlash * 0.9 + uFlux * 0.5);
    // Corona color: deep violet at rest, shifts to bright violet on beat
    vec3 coronaColor = mix(vec3(1.3, 1.1, 2.2), vec3(1.6, 1.5, 2.4), uBeatFlash * 0.55);
    col = mix(col, coronaColor, clamp(hotRim * 0.38, 0.0, 0.45));
    // Audio transient flash — brief silhouette flare on sudden onset (flux)
    col *= 1.0 + uFlux * 0.32 * (1.0 - NdotV * 0.55);
    // Electrical arc on beat — bright horizontal bands surge at silhouette on strong beats
    float arc = pow(sin(vPosition.y * 11.0 + uTime * 14.0) * 0.5 + 0.5, 3.0);
    col += vec3(0.8, 0.7, 1.9) * arc * (uBeatFlash * uBeatFlash * 0.28 + uHigh * uHigh * 0.07) * (1.0 - NdotV);
    // Cool treble arc — diagonal bands at X-axis; responds to high-frequency content
    float arc2 = pow(sin(vPosition.x * 8.5 + uTime * 10.5 + uHigh * 4.5) * 0.5 + 0.5, 4.0);
    col += vec3(0.9, 1.3, 2.1) * arc2 * uHigh * uHigh * 0.16 * (1.0 - NdotV) * depthFade;
    // Rim impact flash on beat — violet pulse, not white
    col = mix(col, vec3(1.2, 1.0, 2.2), uBeatFlash * edgeFactor * 0.18);
    // Z-depth fog — front of sphere (higher Z) brighter, enhances rotation depth
    float zFog = 0.80 + clamp(vPosition.z / 1.5, 0.0, 0.20);
    // Subtle alpha pulse — wireframe lines breathe gently, ±3% transparency variation
    float alphaPulse = sin(uTime * (1.15 + uBass * 0.75) + vPosition.x * 1.8) * (0.03 + uBass * 0.018) + 1.0;
    float rimAlpha = pow(1.0 - NdotV, 2.8) * (0.12 + uBass * 0.08 + uBeatFlash * 0.06);
    float alpha = (0.28 + uAudioLevel * 0.06 + fresnel * 0.68 + uBass * 0.08 + uMid * 0.03 + uHigh * 0.04 + uBeatFlash * 0.15 + spikeFactor * 0.10 + sparkle * 0.25 + spikeTip * 0.12 + rimAlpha) * depthFade * zFog * alphaPulse;
    // Cross-spectrum color lean — bass pulls toward primary, treble pulls toward secondary
    col = mix(col, col * uColor1 * 1.15, uBass * (1.0 - uHigh) * 0.12);
    col = mix(col, col * uColor2 * 1.15, uHigh * (1.0 - uBass) * 0.10);
    // Depth warmth — near geometry gets a subtle warm tint like incandescent stage light
    float zTint = clamp(vPosition.z / 1.4, 0.0, 1.0);
    col = mix(col, col * vec3(1.05, 1.02, 0.94), zTint * 0.14);
    // Beat sawtooth sweep — sharp brightness wave races outward from sphere center on beat
    float sawTime = fract(uTime * 0.5 + uBeatFlash * 0.9);
    float sawSweep = (1.0 - sawTime) * uBeatFlash * 0.20 * (1.0 - NdotV * 0.4) * depthFade;
    col += uColor2 * sawSweep;
    // Subtle film grain — organic texture reminiscent of vinyl/analog media
    float grain = fract(sin(dot(gl_FragCoord.xy + uTime * 131.7, vec2(12.9898, 78.233))) * 43758.5453);
    col += (grain - 0.5) * 0.016;
    gl_FragColor = vec4(clamp(col, 0.0, 2.2), clamp(alpha, 0.0, 0.98));
  }
`;

// ===================================================================
// SPHERE MESH
// ===================================================================
const sphereGeo = new THREE.IcosahedronGeometry(0.90, 2);
const sphereMat = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  uniforms: {
    uTime:       { value: 0 },
    uAudioLevel: { value: 0 },
    uBass:       { value: 0 },
    uMid:        { value: 0 },
    uHigh:       { value: 0 },
    uColor1:     { value: new THREE.Color(0x2A0B3D) },
    uColor2:     { value: new THREE.Color(0x7A2CFF) },
    uBeatFlash:  { value: 0 },
    uFlux:       { value: 0 },
  },
  wireframe: true,
  transparent: true,
  blending: THREE.NormalBlending,
  depthWrite: false,
});
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
sphere.position.set(0, 0.1, 0);
sphere.renderOrder = 1;
scene.add(sphere);

// ── Fake bloom: two additive wireframe passes at +0.8% and +2% scale ─────────
// Each pass shares uniforms with sphereMat (same deformation, auto-synced),
// but renders AdditiveBlending with pure edge-only alpha → neon tube glow illusion.
const glowWireFragShader = `
  uniform vec3 uColor1;
  uniform vec3 uColor2;
  uniform float uAudioLevel;
  uniform float uBass;
  uniform float uMid;
  uniform float uHigh;
  uniform float uBeatFlash;
  uniform float uFlux;
  uniform float uTime;
  varying vec3 vNormal;
  varying vec3 vPosition;
  varying float vDisplacement;
  void main() {
    vec3 viewDir = normalize(cameraPosition - vPosition);
    float signedNdotV = dot(normalize(vNormal), viewDir);
    float NdotV  = abs(signedNdotV);
    float depthFade = clamp(signedNdotV * 2.5 + 1.0, 0.12, 1.0);
    float fresnel = pow(1.0 - NdotV, max(2.8 - uBass * 0.7 - uBeatFlash * 0.4, 1.6));
    float edgeFactor = clamp(fresnel * (1.0 + uBass * 3.2 + uAudioLevel * 1.4 + uBeatFlash * 2.0), 0.0, 1.0);
    float spikeFactor = clamp(vDisplacement * 1.0, 0.0, 1.0);
    vec3 col = mix(uColor1, uColor2, max(max(edgeFactor, spikeFactor * 0.7), 0.25));
    float gwB = pow(max(uBass, 0.0), 0.75); float gwF = pow(max(uBeatFlash, 0.0), 0.80);
    float gwEnergy = uAudioLevel * 0.90 + gwB * 1.35 + uMid * 0.55 + gwF * 1.55 + uFlux * 1.10;
    col *= 0.80 + 0.90 * tanh(gwEnergy / 2.20);
    float shimmer = sin(uTime * (2.1 + uBass * 2.5) + vPosition.y * 3.8 + vPosition.x * 2.6) * (0.022 + uAudioLevel * 0.018 + uBeatFlash * 0.022) + 1.0;
    col *= shimmer;
    float alpha = (0.11 + fresnel * (0.30 + uFlux * 0.10) + spikeFactor * 0.13 + uBass * 0.08 + uMid * 0.04 + uBeatFlash * 0.18) * depthFade;
    gl_FragColor = vec4(clamp(col, 0.0, 3.0), clamp(alpha, 0.0, 0.88));
  }
`;
const outerGlowWireFragShader = `
  uniform vec3 uColor1;
  uniform vec3 uColor2;
  uniform float uAudioLevel;
  uniform float uBass;
  uniform float uMid;
  uniform float uHigh;
  uniform float uBeatFlash;
  uniform float uFlux;
  uniform float uTime;
  varying vec3 vNormal;
  varying vec3 vPosition;
  varying float vDisplacement;
  void main() {
    vec3 viewDir = normalize(cameraPosition - vPosition);
    float signedNdotV = dot(normalize(vNormal), viewDir);
    float NdotV  = abs(signedNdotV);
    float depthFade = clamp(signedNdotV * 2.5 + 1.0, 0.15, 1.0);
    float fresnel = pow(1.0 - NdotV, max(2.2 - uBass * 0.5 - uBeatFlash * 0.3, 1.4));
    float edgeFactor = clamp(fresnel * (0.8 + uBass * 2.4 + uAudioLevel * 1.0 + uBeatFlash * 1.6), 0.0, 1.0);
    float spikeFactor = clamp(vDisplacement * 0.7, 0.0, 1.0);
    vec3 col = mix(uColor1, uColor2, max(max(edgeFactor, spikeFactor * 0.5), 0.12));
    float owEnergy = uAudioLevel * 0.70 + uBass * 1.20 + uMid * 0.45 + uBeatFlash * 1.40 + uFlux * 0.90;
    col *= 0.60 + 0.80 * tanh(owEnergy / 2.00);
    float shimmer = sin(uTime * 2.1 + vPosition.y * 3.8 + vPosition.x * 2.6) * 0.015 + 1.0;
    col *= shimmer;
    float alpha = (0.07 + fresnel * (0.16 + uFlux * 0.07) + spikeFactor * 0.07 + uBass * 0.04 + uMid * 0.02 + uBeatFlash * 0.10) * depthFade;
    gl_FragColor = vec4(clamp(col, 0.0, 3.0), clamp(alpha, 0.0, 0.55));
  }
`;
const glowMat1 = new THREE.ShaderMaterial({
  vertexShader, fragmentShader: glowWireFragShader,
  uniforms: sphereMat.uniforms,
  wireframe: true, transparent: true,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const glowSphere1 = new THREE.Mesh(sphereGeo, glowMat1);
glowSphere1.scale.setScalar(1.008);
glowSphere1.renderOrder = 2;
sphere.add(glowSphere1);

const glowMat2 = new THREE.ShaderMaterial({
  vertexShader, fragmentShader: outerGlowWireFragShader,
  uniforms: sphereMat.uniforms,
  wireframe: true, transparent: true,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const glowSphere2 = new THREE.Mesh(sphereGeo, glowMat2);
glowSphere2.scale.setScalar(1.022);
glowSphere2.renderOrder = 3;
sphere.add(glowSphere2);

// ── Dual-layer glow: solid NormalBlending core + faint AdditiveBlending halo ──
// Core: bounded bright sun with no alpha bleed; Halo: subtle warmth, alpha≤0.14
const glowVertShader = `
  varying vec3 vNormal;
  varying vec3 vViewPos;
  void main() {
    vNormal  = normalize(normalMatrix * normal);
    vViewPos = (modelViewMatrix * vec4(position, 1.0)).xyz;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
// Core fragment: steep alpha ramp (0→0.15) → sharp solid edge; NormalBlending keeps it bounded
const coreFragShader = `
  varying vec3 vNormal;
  varying vec3 vViewPos;
  uniform float uIntensity;
  uniform vec3 uGlowColor;
  void main() {
    vec3 viewDir = normalize(-vViewPos);
    float VdotN  = max(0.0, dot(viewDir, vNormal));
    float t = pow(VdotN, 6.0);
    vec3 color = uGlowColor * 2.2;
    float alpha = t * 0.10 * uIntensity;
    gl_FragColor = vec4(color, alpha);
  }
`;
const haloFragShader = `
  varying vec3 vNormal;
  varying vec3 vViewPos;
  uniform float uIntensity;
  uniform vec3 uGlowColor;
  void main() {
    vec3 viewDir = normalize(-vViewPos);
    float VdotN  = max(0.0, dot(viewDir, vNormal));
    // Fresnel rim: glow only at sphere silhouette edge, not filled disc
    float rim = pow(1.0 - VdotN, 3.5);
    float alpha = rim * 0.28 * uIntensity;
    gl_FragColor = vec4(uGlowColor, alpha);
  }
`;
const coreMat = new THREE.ShaderMaterial({ // color updated by applyEnvColor on theme change
  vertexShader: glowVertShader,
  fragmentShader: coreFragShader,
  uniforms: { uIntensity: { value: 1.0 }, uGlowColor: { value: new THREE.Color(0x3a1280) } },
  transparent: true, side: THREE.FrontSide,
  depthWrite: false, blending: THREE.AdditiveBlending,
});
const coreSphere = new THREE.Mesh(new THREE.SphereGeometry(0.58, 24, 24), coreMat);
coreSphere.position.set(0, 0.1, 0);
coreSphere.renderOrder = 0;
scene.add(coreSphere);
// haloSphere and outerAuraSphere removed — any separate sphere in a dark void
// creates a visible filled disc silhouette. The wireframe Fresnel edge glow is
// the premium visual; coreSphere provides subtle inner warmth only.
const haloMat = new THREE.ShaderMaterial({
  vertexShader: glowVertShader,
  fragmentShader: haloFragShader,
  uniforms: { uIntensity: { value: 1.0 }, uGlowColor: { value: new THREE.Color(0x3a1280) } },
  transparent: true, side: THREE.FrontSide,
  depthWrite: false, blending: THREE.AdditiveBlending,
});
const outerAuraMat = haloMat; // alias so applyEnvColor references stay valid

// Thin orbital rings make the center read as a music planet without adding post-processing.
const orbitGroup = new THREE.Group();
orbitGroup.position.copy(sphere.position);

function makeOrbitRing(radius, tube, color, opacity, rotation) {
  const geo = new THREE.TorusGeometry(radius, tube, 8, 90);
  const mat = new THREE.MeshBasicMaterial({
    color,
    transparent: true,
    opacity,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    depthTest: false,
  });
  const ring = new THREE.Mesh(geo, mat);
  ring.rotation.set(rotation[0], rotation[1], rotation[2]);
  ring.renderOrder = 4;
  ring.userData.baseOpacity = opacity;
  orbitGroup.add(ring);
  return ring;
}

const orbitRings = [

  makeOrbitRing(1.22, 0.020, 0xaaccff, 0.78, [0.72, 0.28, 0.18]),
  makeOrbitRing(1.46, 0.012, 0x6688dd, 0.44, [1.10, -0.36, -0.22]),
  makeOrbitRing(1.52, 0.007, 0xccddff, 0.28, [1.38, 0.62, 0.34]),
  makeOrbitRing(1.80, 0.004, 0xe8eeff, 0.18, [0.55, -0.80, 0.42]),
];
orbitGroup.visible = false;

// ── Audio comet satellites ────────────────────────────────────────────────

cometGroup.position.copy(sphere.position);
cometGroup.rotation.set(0.24, -0.32, 0.18);

const cometHeadMats = [];

// Soft radial glow sprite — makes points appear as orbs, not squares
const _ptCanvas = document.createElement('canvas');
_ptCanvas.width = _ptCanvas.height = 32;
const _ptCtx = _ptCanvas.getContext('2d');
const _ptGrad = _ptCtx.createRadialGradient(16, 16, 0, 16, 16, 16);
_ptGrad.addColorStop(0,    'rgba(255,255,255,1.0)');
_ptGrad.addColorStop(0.35, 'rgba(255,255,255,0.7)');
_ptGrad.addColorStop(0.7,  'rgba(255,255,255,0.15)');

// ── Deep star field — distant stars at r=20-50 ──
const starCount = 1800;

for (let i = 0; i < starCount; i++) {

}

const particleCount = 400;

}

// ── Selectable visual modes: particle wave + spectrum columns ─────────────
const waveCols = 36;
const waveRows = 22;
const waveCount = waveCols * waveRows;
const waveBase = new Float32Array(waveCount * 3);
const wavePos = new Float32Array(waveCount * 3);
for (let y = 0; y < waveRows; y++) {
  for (let x = 0; x < waveCols; x++) {
    const i = y * waveCols + x;
    const px = (x / (waveCols - 1) - 0.5) * 5.4;
    const pz = (y / (waveRows - 1) - 0.5) * 3.4;
    waveBase[i * 3] = px;
    waveBase[i * 3 + 1] = -0.58;
    waveBase[i * 3 + 2] = pz - 0.30;

const nebulaVertShader = `
  attribute vec3  aSeed;
  attribute float aScale;
  attribute float aPhase;

  uniform float uTime;
  uniform float uAudioLevel;
  uniform float uBass;
  uniform float uMid;
  uniform float uHigh;
  uniform float uBeatFlash;
  uniform float uScale;

  varying float vFlicker;
  varying float vMixFactor;

  vec3 nbMod289v3(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
  vec4 nbMod289v4(vec4 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
  vec4 nbPermute(vec4 x) { return nbMod289v4(((x*34.0)+1.0)*x); }
  vec4 nbTir(vec4 r)     { return 1.79284291400159 - 0.85373472095314 * r; }
  float nbNoise(vec3 v) {
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i  = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = nbMod289v3(i);
    vec4 p = nbPermute(nbPermute(nbPermute(
      i.z + vec4(0.0, i1.z, i2.z, 1.0))
      + i.y + vec4(0.0, i1.y, i2.y, 1.0))
      + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * ns.x + ns.yyyy;
    vec4 y = y_ * ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0)*2.0 + 1.0;
    vec4 s1 = floor(b1)*2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
    vec3 p0 = vec3(a0.xy,h.x);
    vec3 p1 = vec3(a0.zw,h.y);
    vec3 p2 = vec3(a1.xy,h.z);
    vec3 p3 = vec3(a1.zw,h.w);
    vec4 norm = nbTir(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)), 0.0);
    m = m * m;
    return 42.0 * dot(m*m, vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
  }

  void main() {
    float t = uTime * 0.10;
    vec3 np = position * 0.55 + aSeed * 2.5;
    float nx = nbNoise(np + vec3(t, 0.0, 0.0));
    float ny = nbNoise(np + vec3(0.0, t + 13.7, 0.0));
    float nz = nbNoise(np + vec3(0.0, 0.0, t + 7.3));
    vec3 swirl = vec3(nx, ny, nz);

    float radialPulse = 1.0 + uBass * 0.18 + uBeatFlash * 0.28;
    float swirlAmp = 0.38 + uMid * 0.25 + uHigh * 0.14;
    vec3 displaced = position * radialPulse + swirl * swirlAmp;

    vec4 mvPos = modelViewMatrix * vec4(displaced, 1.0);
    gl_Position = projectionMatrix * mvPos;

    float twinkle = 0.5 + 0.5 * sin(uTime * (1.8 + aPhase * 2.6) + aPhase * 6.2831);
    vFlicker   = 0.55 + twinkle * (0.45 + uHigh * 0.55);
    vMixFactor = clamp(swirl.x * 0.45 + aSeed.y * 0.1 + 0.5, 0.0, 1.0);

    float sz = aScale * (0.12 + uAudioLevel * 0.04 + uBeatFlash * 0.05) * vFlicker;
    gl_PointSize = clamp(sz * (uScale / max(-mvPos.z, 0.8)), 1.5, 64.0);
  }
`;

  }
`;

function thash(x, y) { const n = Math.sin(x*127.1 + y*311.7)*43758.5453; return n-Math.floor(n); }
function tnoise(x, y) {
  const ix=Math.floor(x), iy=Math.floor(y), fx=x-ix, fy=y-iy;
  const ux=fx*fx*(3-2*fx), uy=fy*fy*(3-2*fy);
  return thash(ix,iy)*(1-ux)*(1-uy) + thash(ix+1,iy)*ux*(1-uy)
       + thash(ix,iy+1)*(1-ux)*uy   + thash(ix+1,iy+1)*ux*uy;
}
function tfbm(x, y) {
  let v=0, a=0.55, f=1.0;
  for(let i=0;i<6;i++){v+=tnoise(x*f,y*f)*a; a*=0.48; f*=2.13;}
  return v;
}

function initAudio() {
  if (audioConnected) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    sourceNode = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.82;
    analyser.minDecibels = -90;
    analyser.maxDecibels = -10;   // KEY FIX: default -30 saturates all music
    compressor = audioCtx.createDynamicsCompressor();
    compressor.threshold.setValueAtTime(-18, audioCtx.currentTime);
    compressor.knee.setValueAtTime(30, audioCtx.currentTime);
    compressor.ratio.setValueAtTime(8, audioCtx.currentTime);
    compressor.attack.setValueAtTime(0.003, audioCtx.currentTime);
    compressor.release.setValueAtTime(0.25, audioCtx.currentTime);
    sourceNode.connect(analyser);
    analyser.connect(compressor);
    compressor.connect(audioCtx.destination);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    audioConnected = true;
  } catch (e) {
    // Visualization is optional — never let Web Audio failures break playback.
    console.warn('[audio] analyser init failed, playback continues without viz:', e);
    analyser = null;
  }
}

let audioLevel = 0, bassLevel = 0, midLevel = 0, highLevel = 0;
let fluxLevel = 0, brightnessLevel = 0;
let prevDataArray = null;
// Rolling 90-frame bass history for dynamic beat threshold (~1.5s at 60fps)
const bassHistory = new Float32Array(90);
let bassHistIdx = 0;

function updateAudio() {
  if (!analyser) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  analyser.getByteFrequencyData(dataArray);

  const binCount = dataArray.length;
  const bassBins = Math.floor(binCount * 0.06);   // 0–6%  sub+bass
  const midBins  = Math.floor(binCount * 0.30);   // 6–30% low-mid
  const highBins = Math.floor(binCount * 0.70);   // 30–70% hi-mid+presence

  let bassSum = 0, midSum = 0, highSum = 0;
  for (let i = 0; i < bassBins; i++)          bassSum += dataArray[i];
  for (let i = bassBins; i < midBins; i++)    midSum  += dataArray[i];
  for (let i = midBins;  i < highBins; i++)   highSum += dataArray[i];
  // brightness = air band (70–100%) — controls particle sparkle
  let brightSum = 0;
  for (let i = highBins; i < binCount; i++)   brightSum += dataArray[i];

  const rawBass       = Math.pow(bassSum / bassBins / 255, 0.85);
  const rawMid        = Math.pow(midSum  / (midBins - bassBins) / 255, 0.85);
  const rawHigh       = Math.pow(highSum / (highBins - midBins) / 255, 0.85);
  const rawBrightness = Math.pow(brightSum / (binCount - highBins) / 255, 0.75);
  const rawOverall    = Math.pow((bassSum + midSum + highSum) / binCount / 255, 0.85);

  // Spectral flux = sum of positive spectral changes vs previous frame (onset detector)
  let fluxSum = 0;
  if (prevDataArray) {
    for (let i = 0; i < binCount; i++) {
      const d = dataArray[i] - prevDataArray[i];
      if (d > 0) fluxSum += d;
    }
  }
  const rawFlux = Math.min(fluxSum / (binCount * 60), 1.0);

  const atk = 0.68, rel = 0.08;
  bassLevel       = rawBass       > bassLevel       ? bassLevel       + (rawBass       - bassLevel)       * atk : bassLevel       + (rawBass       - bassLevel)       * rel;
  midLevel        = rawMid        > midLevel        ? midLevel        + (rawMid        - midLevel)        * atk : midLevel        + (rawMid        - midLevel)        * rel;
  highLevel       = rawHigh       > highLevel       ? highLevel       + (rawHigh       - highLevel)       * atk : highLevel       + (rawHigh       - highLevel)       * rel;
  brightnessLevel = rawBrightness > brightnessLevel ? brightnessLevel + (rawBrightness - brightnessLevel) * 0.45 : brightnessLevel + (rawBrightness - brightnessLevel) * 0.08;
  fluxLevel       = rawFlux       > fluxLevel       ? fluxLevel       + (rawFlux       - fluxLevel)       * 0.70 : fluxLevel       + (rawFlux       - fluxLevel)       * 0.18;
  audioLevel      = audioLevel    + (rawOverall     - audioLevel)     * 0.15;

  // Update rolling bass history for dynamic beat threshold
  bassHistory[bassHistIdx] = bassLevel;
  bassHistIdx = (bassHistIdx + 1) % bassHistory.length;

  // Save this frame's spectrum for next-frame flux
  if (!prevDataArray) prevDataArray = new Uint8Array(binCount);
  prevDataArray.set(dataArray);
}
