  el.bar.style.width = (clamped * 100).toFixed(1) + '%';
  el.val.textContent = clamped.toFixed(2);
}

// ===================================================================
// ── LIQUID AURA MODE — independent 2D canvas visualizer ─────────────
// Reuses _sBass/_sMid/_sHigh smoothed signals from the shared audio pipeline.
// Does NOT touch Three.js materials, sphere shader, or particle systems.
// ===================================================================

const _laCanvas = document.getElementById('liquid-canvas');
const _laCtx = _laCanvas ? _laCanvas.getContext('2d') : null;
let _laTime = 0;
let _laLastFrameTime = 0;
let _laPlayBlend = 0;  // lerped 0→1 on play, decays to 0 on pause over ~1s

// Album/theme accent for liquid aura — vivid HSL (the old satMax=0.42 clamp made everything mud)
let _laHue = 0.745, _laSat = 0.85, _laLight = 0.58;

function updateLiquidAccent(threeColor) {
  const hsl = {};
  threeColor.getHSL(hsl);
  _laHue = hsl.h;
  _laSat = Math.min(Math.max(hsl.s, 0.45), 0.95);
  _laLight = Math.min(Math.max(hsl.l, 0.48), 0.66);
}

let _laDpr = 1;
function _resizeLiquidCanvas() {
  if (!_laCanvas) return;
  // Render at device resolution — the old CSS-pixel canvas was blurry on retina.
  _laDpr = Math.min(window.devicePixelRatio || 1, 2);
  _laCanvas.width  = Math.round(window.innerWidth  * _laDpr);
  _laCanvas.height = Math.round(window.innerHeight * _laDpr);
}
window.addEventListener('resize', _resizeLiquidCanvas);
_resizeLiquidCanvas();

// Drifting particles (lazy init once viewport size is known)
let _laParticles = null;
function _laInitParticles(W, H) {
  _laParticles = Array.from({ length: 70 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    spd: 6 + Math.random() * 22,
    sway: 8 + Math.random() * 26,
    ph: Math.random() * Math.PI * 2,
    r: 0.7 + Math.random() * 1.9,
  }));
}

// ── Aurora mesh-gradient blobs ──────────────────────────────────────
// Technique: draw big radial-gradient blobs additively into a tiny offscreen
// buffer, then upscale to full screen — bilinear upscaling acts as a free
// giant-radius blur, so the colors melt into one seamless aurora field.
// Palette: curated analogous hues around the album/theme accent + one cool
// cyan counterpoint at low alpha (the classic aurora cyan/purple/pink logic).
const _LA_BUF_W = 224, _LA_BUF_H = 140;
const _laBuf = document.createElement('canvas');
_laBuf.width = _LA_BUF_W; _laBuf.height = _LA_BUF_H;
const _laBufCtx = _laBuf.getContext('2d');

function _laColorAbs(hDeg, s, l, a) {
  return `hsla(${hDeg.toFixed(0)},${(s * 100).toFixed(0)}%,${(l * 100).toFixed(0)}%,${a.toFixed(3)})`;
}

const _LA_BLOBS = [
  { hue:   0, satMul: 1.00, light: 0.52, a: 0.80, r: 0.62, sx: 0.10, sy: 0.08, px: 0.0, py: 1.3, band: 'bass' },
  { hue:  42, satMul: 0.90, light: 0.56, a: 0.60, r: 0.50, sx: 0.13, sy: 0.10, px: 2.1, py: 0.4, band: 'mid'  },
  { hue: -48, satMul: 0.95, light: 0.46, a: 0.62, r: 0.55, sx: 0.08, sy: 0.12, px: 4.2, py: 2.6, band: 'bass' },
  { hue:  20, satMul: 0.80, light: 0.62, a: 0.42, r: 0.36, sx: 0.18, sy: 0.15, px: 1.0, py: 3.8, band: 'high' },
  { cyan: 195, satMul: 0.85, light: 0.55, a: 0.24, r: 0.48, sx: 0.06, sy: 0.10, px: 3.3, py: 5.1, band: 'mid' },
  { hue:   8, satMul: 0.30, light: 0.86, a: 0.15, r: 0.26, sx: 0.15, sy: 0.20, px: 5.6, py: 0.9, band: 'high' },
];

function _renderLiquidAura(dt) {
  if (!_laCtx || !_laCanvas) return;
  _laTime += dt;
  const t = _laTime;
  const W = _laCanvas.width / _laDpr;
  const H = _laCanvas.height / _laDpr;
  _laCtx.setTransform(_laDpr, 0, 0, _laDpr, 0, 0);
  const isPlaying = !audio.paused;

  // Smooth blend: playing → 1 (fast attack ~0.4s), paused → 0 (slow decay ~1.5s)
  const blendRate = isPlaying ? dt * 2.5 : dt * 0.65;
  _laPlayBlend += ((isPlaying ? 1.0 : 0.0) - _laPlayBlend) * Math.min(blendRate, 1.0);
  const pb = _laPlayBlend;

  if (!_laParticles) _laInitParticles(W, H);

  // ── Aurora field: blobs → tiny buffer → upscale (free giant blur) ──
  const bw = _LA_BUF_W, bh = _LA_BUF_H;
  const bctx = _laBufCtx;
  const hDeg = _laHue * 360;
  const energy = { bass: _sBass, mid: _sMid, high: _sHigh };
  const drift = 0.45 + pb * 0.55 + _sMid * 0.6;          // paused → slow ambient drift

  bctx.globalCompositeOperation = 'source-over';
  bctx.fillStyle = _laColorAbs(hDeg, 0.55, 0.05, 1);     // near-black base tinted with the accent hue
  bctx.fillRect(0, 0, bw, bh);
  bctx.globalCompositeOperation = 'lighter';

  const bmin = Math.min(bw, bh);
  for (const b of _LA_BLOBS) {
    const e = energy[b.band] || 0;
    const h = b.cyan ? b.cyan : ((hDeg + b.hue) % 360 + 360) % 360;
    const x = bw * (0.5 + 0.38 * Math.sin(t * b.sx * drift * Math.PI * 2 + b.px));
    const y = bh * (0.5 + 0.36 * Math.sin(t * b.sy * drift * Math.PI * 2 + b.py));
    const r = bmin * b.r * (1 + _sBass * 0.34 + beatFlash * 0.24) * (1.4 + e * 0.65);
    const a = Math.min(b.a * (0.62 + pb * 0.15 + e * 0.55 + beatFlash * 0.38), 0.95);
    const s = Math.min(_laSat * b.satMul, 1);
    const g = bctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0,    _laColorAbs(h, s, b.light, a));
    g.addColorStop(0.55, _laColorAbs(h, s, b.light * 0.8, a * 0.35));
    g.addColorStop(1,    _laColorAbs(h, s, b.light * 0.6, 0));
    bctx.fillStyle = g;
    bctx.fillRect(0, 0, bw, bh);
  }

  // Beat flash — the whole aurora field lifts briefly on each detected hit
  if (beatFlash > 0.06) {
    bctx.fillStyle = _laColorAbs(hDeg, Math.min(_laSat, 0.8), 0.60, beatFlash * 0.16);
    bctx.fillRect(0, 0, bw, bh);
  }

  // Upscale the buffer to the full canvas — bilinear smoothing = seamless blend
  _laCtx.globalCompositeOperation = 'source-over';
  _laCtx.imageSmoothingEnabled = true;
  _laCtx.imageSmoothingQuality = 'high';
  _laCtx.drawImage(_laBuf, 0, 0, W, H);

  // ── Particles — faint stars drifting up through the aurora
  _laCtx.globalCompositeOperation = 'lighter';
  for (const p of _laParticles) {
    p.y -= p.spd * dt * (0.4 + pb * 0.7 + _sMid * 0.6);
    const px = p.x + Math.sin(t * 0.5 + p.ph) * p.sway;
    if (p.y < -8) { p.y = H + 8; p.x = Math.random() * W; }
    const tw = 0.35 + 0.65 * Math.abs(Math.sin(t * 1.6 + p.ph));
    const a = (0.05 + tw * 0.16 + _sHigh * 0.20) * (0.45 + pb * 0.55);
    _laCtx.fillStyle = _laColorAbs(hDeg, 0.20, 0.90, Math.min(a, 0.40));
    _laCtx.beginPath();
    _laCtx.arc(px, p.y, p.r, 0, Math.PI * 2);
    _laCtx.fill();
  }

  // ── Vignette — gentle edge falloff
  _laCtx.globalCompositeOperation = 'source-over';
  const md = Math.min(W, H);
  const vg = _laCtx.createRadialGradient(W / 2, H / 2, md * 0.35, W / 2, H / 2, md * 0.95);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.45)');
  _laCtx.fillStyle = vg;
  _laCtx.fillRect(0, 0, W, H);
}

function _animateLiquid() {
  requestAnimationFrame(_animateLiquid);
  if (state.visualMode !== 'liquidAura' || document.hidden) return;
  const now = performance.now() / 1000;
  if (_laLastFrameTime === 0) _laLastFrameTime = now;
  const dt = Math.min(now - _laLastFrameTime, 0.05);
  _laLastFrameTime = now;
  _renderLiquidAura(dt);
}
_animateLiquid();

function animate() {
  requestAnimationFrame(animate);

  if (document.hidden) {
    clock.getDelta();
    return;
  }

  const delta = Math.min(clock.getDelta(), 0.05);
  time += delta;

  updateAudio();

  // ── Beat onset detection (dynamic threshold) ─────────────────────
  if (beatCooldown > 0) beatCooldown--;
  // Dynamic threshold: average window shrinks with faster tempos for tighter beat tracking
  const _dynWin = Math.max(12, Math.min(60, Math.round(_beatInterval * 60 * 0.55)));
  let bassAvg = 0;
  for (let i = 0; i < _dynWin; i++) bassAvg += bassHistory[(bassHistIdx - 1 - i + bassHistory.length) % bassHistory.length];
  bassAvg /= _dynWin;
  const beatThreshold = Math.max(0.17, bassAvg * 1.18);
  const onBeat = bassLevel > beatThreshold && bassLevel > prevBass + 0.025 && beatCooldown === 0;
  if (onBeat) {
    beatFlash     = 0.5;
    spherePulse   = 0.35;
    _beatShake    = 0.85;
    _beatHueBurst = 0.3;
    // Adaptive cooldown — tracks actual beat interval so fast songs stay locked
    if (_lastBeatTime > 0) {
      _beatInterval = _beatInterval * 0.82 + (time - _lastBeatTime) * 0.18;
    }
    _lastBeatTime = time;
    beatCooldown = Math.max(6, Math.round(_beatInterval * 60 * 0.38));
    // Phase nudge: small jolt in the breathing cycle — creates a visual "heartbeat" shudder
    _breathePhase  += 0.20;
    _breathe2Phase += 0.32;
    // Orbital tilt jolt — rings tip toward viewer on each beat, spring back via lerp
    orbitGroup.rotation.x += 0.10;
    _orbitSpinBoost = 1.0;
    // Strike the tuning fork: ring amplitude scales with how hard the hit is
    _ringAmp = Math.min(0.08 + bassLevel * 0.11, 0.17);  // 暴力: first swing hits hard
    _ringPhase = 0;
    // Shockwave rings removed per user request — the radius ring IS the beat cue.
    pendingShockwave2 = 0;
  }
  if (pendingShockwave2 > 0) pendingShockwave2 = 0;
  prevBass    = bassLevel;
  beatFlash     *= 0.88; // slower decay → more sustained beat punch (was 0.82)
  spherePulse   *= 0.90;
  _beatShake    *= 0.75;
  _beatHueBurst *= 0.84;

  // ── Core sphere — idle breathing + audio reactivity ───────────────
  // Integrated phase so rate change is seamless (no jump when audio energy changes)
  _breathePhase  += delta * (0.72 + _sAudio * 0.42);
  _breathe2Phase += delta * (1.37 + _sAudio * 0.80);
  // Amplitude grows slightly with audio energy — sphere breathes deeper during music
  const _bAmp = 0.055 + _sAudio * 0.022;
  const _breathe = Math.sin(_breathePhase) * _bAmp + Math.sin(_breathe2Phase) * (_bAmp * 0.51);
  sphere.rotation.y += 0.0015 + midLevel * 0.008 + spherePulse * 0.010;
  sphere.rotation.x += 0.0005 + midLevel * 0.003 + spherePulse * 0.004;
  sphere.rotation.z += Math.sin(time * 0.9) * 0.0002 + highLevel * 0.002;
  // Radius follows the EQ band levels 1:1 — same variables the mini bars
  // render, so bar big = swing big, bar small = swing small. Uniform scale
  // on all axes keeps the silhouette a perfect circle.
  const bandRadial = bassLevel * 0.075 + midLevel * 0.025 + highLevel * 0.012;
  // Damped ring oscillation (in AND out) layered on top — the beat "strike"
  _ringPhase += delta * RING_FREQ * Math.PI * 2;
  _ringAmp *= Math.exp(-RING_DECAY * delta);
  const ring = Math.sin(_ringPhase) * _ringAmp;
  const sScale = Math.max(0.86, Math.min(1.0 + _breathe * 0.45 + bandRadial + ring, 1.15));
  sphere.scale.set(sScale, sScale, sScale);

  // Per-band smoothing — brief targets: bass 0.055/frame, mid 0.04/frame, treble 0.025/frame at 60fps
  // Asymmetric: faster attack to catch beats, slow release for organic decay (no jitter)
  const _sfAtkBass  = 1.0 - Math.exp(-delta / 0.08);   // 80ms attack
  const _sfRelBass  = 1.0 - Math.exp(-delta / 0.30);   // 300ms release (~0.055/frame)
  const _sfAtkMid   = 1.0 - Math.exp(-delta / 0.12);   // 120ms attack
  const _sfRelMid   = 1.0 - Math.exp(-delta / 0.42);   // 420ms release (~0.04/frame)
  const _sfAtkHigh  = 1.0 - Math.exp(-delta / 0.18);   // 180ms attack
  const _sfRelHigh  = 1.0 - Math.exp(-delta / 0.66);   // 660ms release (~0.025/frame)
  const _sfAtkAudio = 1.0 - Math.exp(-delta / 0.10);   // 100ms attack for overall level
  const _sfRelAudio = 1.0 - Math.exp(-delta / 0.30);   // 300ms release for overall
  _sBass  += (bassLevel  - _sBass)  * (bassLevel  > _sBass  ? _sfAtkBass  : _sfRelBass);
  _sMid   += (midLevel   - _sMid)   * (midLevel   > _sMid   ? _sfAtkMid   : _sfRelMid);
  _sHigh  += (highLevel  - _sHigh)  * (highLevel  > _sHigh  ? _sfAtkHigh  : _sfRelHigh);
  _sAudio += (audioLevel - _sAudio) * (audioLevel > _sAudio ? _sfAtkAudio : _sfRelAudio);

  sphereMat.uniforms.uTime.value       = time;
  // Breathing modulates perceived audio level slightly — sphere feels more alive
  sphereMat.uniforms.uAudioLevel.value = _sAudio * 0.85 + Math.sin(_breathePhase) * 0.028;
  // Shader inputs boosted ~1.3x so surface displacement / color / glow visibly ride
  // the music (mesh proportions are untouched — sScale cap stays as-is).
  sphereMat.uniforms.uBass.value       = Math.min(_sBass * 1.30, 1.0);
  sphereMat.uniforms.uMid.value        = Math.min(_sMid  * 1.25, 1.0);
  sphereMat.uniforms.uHigh.value       = Math.min(_sHigh * 1.30, 1.0);
  sphereMat.uniforms.uBeatFlash.value  = beatFlash;
  sphereMat.uniforms.uFlux.value       = fluxLevel * 0.95;

  // Mix theme — hue cycles through full spectrum, speed follows audio energy
  if (state.theme === 'mix') {
    _mixHue = (_mixHue + 0.00018 + _sAudio * 0.0007) % 1.0;
    _tColor1.setHSL(_mixHue, 0.90, 0.12);
    _tColor2.setHSL(_mixHue, 1.00, 0.50);
    if (++_mixCssFrame % 18 === 0) {
      const a = new THREE.Color().setHSL(_mixHue, 1.0, 0.56);
      const b = new THREE.Color().setHSL((_mixHue + 0.08) % 1.0, 0.9, 0.68);
      const html = document.documentElement;
      html.style.setProperty('--accent',  '#' + a.getHexString());
      html.style.setProperty('--accent2', '#' + b.getHexString());
      const mr = Math.round(a.r * 255), mg = Math.round(a.g * 255), mb = Math.round(a.b * 255);
      html.style.setProperty('--accent-glow', `rgba(${mr},${mg},${mb},0.22)`);
      applyEnvColor(a);
      updateLiquidAccent(a);
    }
  }

  // Smooth color transition toward target (~1.8s time constant)
  const _cf = 1.0 - Math.exp(-delta / 1.8);
  sphereMat.uniforms.uColor1.value.lerp(_tColor1, _cf);
  sphereMat.uniforms.uColor2.value.lerp(_tColor2, _cf);
  // Color energy model — hue follows the current theme/album target, lightness breathes with music
  // Bug fix: prior block clamped sat from ~1.0 down to 0.45 and lightness from 0.587 down to 0.55 on beats — making beats look DEAD.
  // Also used to hard-clamp hue to [0.695,0.745] (blue-violet) every frame, which silently overrode
  // any theme/album-art color the lerp above had just set — that's why the orb never visibly changed.
  const _colorEnergy = Math.min(_sAudio * 0.12 + _sBass * 0.10 + beatFlash * 0.16, 0.22);
  {
    const _c2 = sphereMat.uniforms.uColor2.value;
    _c2.getHSL(_hslScratch2);
    _c2.setHSL(
      _hslScratch2.h,                                        // hue passes through untouched — follows theme/album target
      Math.min(_hslScratch2.s, 0.98),                        // saturation: natural ~1.0, no bad clamp
      Math.min(_hslScratch2.l + _colorEnergy * 0.20, 0.72)  // lightness: base 0.587 → up to 0.72 on peak energy
    );
  }

  // ── Dual-layer glow: core solid, halo faint ──────────────────────
  const coreScale = 1.0 + _sBass * 0.07 + spherePulse * 0.05 + beatFlash * 0.04;
  _corePulsePhase += delta * (1.8 + _sAudio * 2.2 + spherePulse * 1.8);
  const _corePulse = 0.90 + Math.sin(_corePulsePhase) * 0.10;
  coreMat.uniforms.uIntensity.value = Math.min((0.88 + _sBass * 0.40 + beatFlash * 0.55) * _corePulse, 1.60);
  // Glow drifts toward orb-violet tinted with theme accent — subtle theme feedback on rim
  const _themeRimBlend = Math.min(0.12 + _sAudio * 0.12 + beatFlash * 0.10, 0.28);
  _glowTarget.copy(sphereMat.uniforms.uColor2.value).lerp(_themeAccentColor, _themeRimBlend);
  coreMat.uniforms.uGlowColor.value.lerp(_glowTarget, 0.04);
  haloMat.uniforms.uGlowColor.value.lerp(_glowTarget, 0.04);
  coreSphere.scale.setScalar(coreScale);
  // Glow layers breathe with audio — expand outward on bass/beat for dynamic halo
  glowSphere1.scale.setScalar(1.008 + _sBass * 0.025 + beatFlash * 0.040);
  glowSphere2.scale.setScalar(1.022 + _sBass * 0.050 + beatFlash * 0.080);
  // Slight independent drift so the two glow layers show parallax vs the main sphere
  glowSphere1.rotation.x = Math.sin(time * 0.07) * 0.14;
  glowSphere1.rotation.z = Math.cos(time * 0.05) * 0.09;
  glowSphere2.rotation.x = Math.sin(time * 0.11 + 1.2) * 0.10;
  glowSphere2.rotation.z = Math.cos(time * 0.08 + 0.7) * 0.07;

  // ── Orbit rings — slow, readable motion with bass pulse ─────────────
  _orbitSpinBoost *= 0.88;
  orbitGroup.rotation.y += 0.0012 + midLevel * 0.0035 + _sBass * 0.0020 + _orbitSpinBoost * 0.008;
  orbitGroup.rotation.z -= 0.00045 + highLevel * 0.0012 + _sBass * 0.0008;
  // Bass makes the orbit group tilt on X — rings lean and rock with low-end hits
  orbitGroup.rotation.x += (_sBass * 0.12 - orbitGroup.rotation.x) * Math.min(delta * 2.5, 0.12);
  orbitGroup.scale.setScalar(1.0 + _sBass * 0.050 + spherePulse * 0.055);
  orbitRings.forEach((ring, i) => {
    // Inner ring (i=0) spins harder on beat — closest to sphere, most reactive
    const ringSpinBoost = i === 0 ? spherePulse * 0.010 : spherePulse * 0.004 / (i + 1);
    const spinDir = i % 2 === 0 ? 1 : -1; // alternating rings counter-rotate for depth
    ring.rotation.z += spinDir * (i + 1) * (0.0004 + midLevel * 0.0012) + ringSpinBoost;
    ring.scale.setScalar(1.0 + beatFlash * (0.04 + i * 0.008) + _sMid * 0.016);
    // Independent slow tilt sway per ring + beat snap
    ring.rotation.x += Math.sin(time * (0.13 + i * 0.06)) * 0.0006
                    + bassLevel * 0.005 * Math.sin(time * (0.55 + i * 0.4))
                    + spherePulse * 0.018 * (i % 2 === 0 ? 1 : -1);
    ring.rotation.y += Math.cos(time * (0.09 + i * 0.05)) * 0.0003;
    ring.material.opacity = Math.min(
      ring.userData.baseOpacity * (1.0 + audioLevel * 2.0 + beatFlash * 3.0),
      0.92
    );
    // Alternate between uColor1 and uColor2 per ring for visual contrast
    const _rc = i % 2 === 0 ? sphereMat.uniforms.uColor2.value : sphereMat.uniforms.uColor1.value;
    _rc.getHSL(_hslScratch);
    ring.material.color.setHSL((_hslScratch.h + i * 0.04) % 1.0, Math.min(_hslScratch.s * 1.1, 1.0), Math.min(_hslScratch.l * 1.2 + 0.10, 0.90));
  });

  // ── Audio comets — slanted 3D satellites with bass-reactive trails ───────
  cometGroup.rotation.y += 0.0010 + _sMid * 0.0025 + spherePulse * 0.006;
  cometGroup.rotation.x = 0.24 + Math.sin(time * 0.20) * 0.08 + _sBass * 0.08;
  cometGroup.scale.setScalar(1.0 + _sBass * 0.035 + beatFlash * 0.045);
  _cometColor.copy(sphereMat.uniforms.uColor2.value);
  _cometColor.getHSL(_hslScratch);
  audioComets.forEach((comet, i) => {
    const speed = comet.speed + _sBass * 0.75 + beatFlash * 0.65;
    const phase = time * speed + comet.phase + spherePulse * 0.35;
    const radialWobble = Math.sin(time * (0.73 + i * 0.09) + comet.phase) * (0.035 + _sMid * 0.025);
    const radius = comet.radius + radialWobble + beatFlash * (0.025 + i * 0.006);
    const yAmp = comet.yAmp + _sBass * 0.10;
    comet.head.position.set(
      Math.cos(phase) * radius,
      Math.sin(phase * 1.7 + comet.tilt) * yAmp + Math.cos(phase * 0.7) * 0.06,
      Math.sin(phase) * radius * (0.62 + i * 0.035)
    );
    const headScale = 1.0 + _sBass * 2.2 + beatFlash * 2.8 + (i === 0 ? fluxLevel * 1.2 : 0.0);
    comet.head.scale.setScalar(headScale);
    comet.headMat.opacity = Math.min(0.55 + _sAudio * 0.26 + beatFlash * 0.34, 1.0);

    for (let p = 0; p < cometTailPoints; p++) {
      const lag = p * (0.055 + _sBass * 0.010);
      const tp = phase - lag * speed * 1.45;
      const fadeRadius = radius * (1.0 - p * 0.006);
      const k = p * 3;
      comet.tailPos[k]     = Math.cos(tp) * fadeRadius;
      comet.tailPos[k + 1] = Math.sin(tp * 1.7 + comet.tilt) * yAmp + Math.cos(tp * 0.7) * 0.06;
      comet.tailPos[k + 2] = Math.sin(tp) * fadeRadius * (0.62 + i * 0.035);
    }
    comet.tailGeo.attributes.position.needsUpdate = true;
    const hueShift = (_hslScratch.h + i * 0.035 + beatFlash * 0.035) % 1.0;
    const cometLight = Math.min(_hslScratch.l * 1.15 + 0.16 + beatFlash * 0.10, 0.92);
    comet.headMat.color.setHSL(hueShift, Math.min(_hslScratch.s * 1.15, 1.0), cometLight);
    comet.tail.material.color.copy(comet.headMat.color);
    comet.tail.material.opacity = Math.min(0.12 + _sBass * 0.20 + beatFlash * 0.32 + fluxLevel * 0.12, 0.62);
  });

  // ── Terrain point light — bass drives steady glow, flux adds sharp snap ──
  sphereLight.intensity = 1.2 + _sBass * 1.5 + beatFlash * 1.2 + fluxLevel * 1.0;
  sphereLight.color.lerp(sphereMat.uniforms.uColor2.value, 0.04);

  // ── Expanding shockwaves (thin torus rings, not filled disks) ─────
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const sw = shockwaves[i];
    sw.age++;
    const p = sw.age / sw.maxAge;
    // Primary: ease-out (fast start, slow end); secondary: ease-in-out (graceful trail)
    const eased = sw.secondary
      ? p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2
      : 1.0 - Math.pow(1.0 - p, 2.5);
    const maxExpand = sw.secondary ? 1.2 : 1.8;
    sw.mesh.scale.setScalar(1.0 + eased * maxExpand);
    sw.mat.opacity = (sw.secondary ? 0.75 : 1.00) * Math.pow(1.0 - p, sw.secondary ? 1.1 : 1.3);
    if (sw.age >= sw.maxAge) {
      scene.remove(sw.mesh);
      sw.geo.dispose();
      sw.mat.dispose();
      shockwaves.splice(i, 1);
    }
  }

  // ── Background particles — very faint depth cue, only flicker on loud peaks ──
  particles.rotation.y -= 0.00015 + brightnessLevel * 0.0012 + spherePulse * 0.0030;
  particles.rotation.x += 0.00005 + brightnessLevel * 0.0004;
  particles.rotation.z += 0.00008 + _sAudio * 0.0004;
  particleMat.opacity = Math.min(0.04 + brightnessLevel * 0.05 + beatFlash * 0.04, 0.10);
  particleMat.size    = 0.014 + _sBass * 0.010 + beatFlash * 0.008;
  particles.scale.setScalar(1.0 + _sBass * 0.04 + beatFlash * 0.06);
  // color stays fixed muted-purple — no lerp toward theme color

  // ── Near-sphere halo — subtle orbital dust, barely visible at idle ──
  haloParticles.rotation.y += 0.0008 + midLevel * 0.004 + _sBass * 0.012 + spherePulse * 0.025 + beatFlash * 0.045;
  haloParticles.rotation.x -= 0.0003 + highLevel * 0.002 + _sBass * 0.006;
  haloParticles.rotation.z += Math.sin(time * 0.41) * 0.0004;
  haloMat2.opacity = Math.min(0.06 + _sBass * 0.09 + spherePulse * 0.05 + beatFlash * 0.05, 0.18);
  haloMat2.size    = 0.018 + _sBass * 0.014 + beatFlash * 0.012;
  haloParticles.scale.setScalar(1.0 + _sBass * 0.06 + spherePulse * 0.08 + beatFlash * 0.04);
  // color stays fixed muted-purple — no lerp toward theme color

  // ── Nebula swarm — slow drift + uScale sync for correct point-size attenuation ──
  nebulaSwarm.rotation.y += 0.00040 + _sBass * 0.0009 + beatFlash * 0.002;
  nebulaSwarm.rotation.x += Math.sin(time * 0.19) * 0.00015;
  nebulaMat.uniforms.uScale.value = renderer.domElement.height * 0.5;

  // ── User-selectable 3D rhythm modes ───────────────────────────────
  const waveActive = state.visualMode === 'wave';
  const barsActive = state.visualMode === 'bars';
  waveField.visible = waveActive;
  spectrumBars.visible = barsActive;

  if (waveActive) {
    const waveColor = sphereMat.uniforms.uColor2.value;
    waveMat.color.lerp(waveColor, 0.05);
    waveMat.opacity = Math.min(0.22 + _sAudio * 0.28 + beatFlash * 0.28, 0.72);
    waveMat.size = 0.020 + _sHigh * 0.020 + beatFlash * 0.012;
    for (let i = 0; i < waveCount; i++) {
      const x = waveBase[i * 3];
      const z = waveBase[i * 3 + 2];
      const dist = Math.sqrt(x * x + z * z);
      const ridge = Math.sin(dist * 2.8 - time * (2.4 + _sBass * 2.1)) * (0.16 + _sBass * 0.22);
      const cross = Math.cos(x * 2.2 + time * (1.6 + _sMid * 1.8)) * Math.sin(z * 2.1 - time * 1.1) * (0.08 + _sMid * 0.14);
      const sparkleLift = Math.sin((x + z) * 4.0 + time * (4.0 + _sHigh * 3.0)) * _sHigh * 0.08;
      wavePos[i * 3] = x + Math.sin(time * 0.45 + z) * 0.025;
      wavePos[i * 3 + 1] = waveBase[i * 3 + 1] + ridge + cross + sparkleLift + beatFlash * 0.10 * Math.max(0, 1.0 - dist / 3.2);
      wavePos[i * 3 + 2] = z + Math.cos(time * 0.38 + x) * 0.025;
    }
    waveGeo.attributes.position.needsUpdate = true;
    waveField.rotation.y += 0.0007 + _sBass * 0.0015;
  }

  if (barsActive) {
    const binCount = dataArray?.length || 0;
    barMat.color.lerp(sphereMat.uniforms.uColor2.value, 0.05);
    barMat.opacity = Math.min(0.24 + _sAudio * 0.34 + beatFlash * 0.28, 0.78);
    for (let i = 0; i < barCount; i++) {
      const t = i / barCount;
      const bin = binCount ? Math.min(binCount - 1, Math.floor(t * t * binCount * 0.72)) : 0;
      const raw = binCount ? dataArray[bin] / 255 : (0.18 + Math.sin(time * 1.5 + i) * 0.08);
      const lift = Math.pow(raw, 0.72) * 1.25 + _sBass * 0.25 + beatFlash * 0.18;
      const height = 0.12 + lift * (0.70 + Math.sin(i * 0.7) * 0.08);
      const col = i % 16;
      const row = Math.floor(i / 16);
      const x = (col - 7.5) * 0.18;
      const z = -0.85 + row * 0.33 + Math.sin(time * 0.32 + i) * 0.025;
      _barDummy.position.set(x, height * 0.5, z);
      _barDummy.scale.set(1.0, height, 1.0);
      _barDummy.rotation.y = Math.sin(time * 0.5 + i * 0.23) * 0.12;
      _barDummy.updateMatrix();
      spectrumBars.setMatrixAt(i, _barDummy.matrix);
    }
    spectrumBars.instanceMatrix.needsUpdate = true;
    spectrumBars.rotation.y = Math.sin(time * 0.20) * 0.10;
  }

  // ── Planet pulse UI (12fps is enough, keeps layout work low) ─────────
  // ── Ambient bloom — colored radial glow behind sphere, pulses with bass ──
  if (time - lastBgGlow > 0.05) {
    lastBgGlow = time;
    const gc1 = sphereMat.uniforms.uColor1.value;
    const gc2 = sphereMat.uniforms.uColor2.value;
    const gcMix = Math.min(0.70 + beatFlash * 0.22, 0.92);
    const r = Math.round((gc2.r * gcMix + gc1.r * (1 - gcMix)) * 255);
    const g = Math.round((gc2.g * gcMix + gc1.g * (1 - gcMix)) * 255);
    const b = Math.round((gc2.b * gcMix + gc1.b * (1 - gcMix)) * 255);
    const strength = _sBass * 0.22 + beatFlash * 0.40;
    // Bloom size pulses with bass for a breathing effect
    const bw = (40 + _sBass * 20 + beatFlash * 28).toFixed(1);
    const bh = (34 + _sBass * 16 + beatFlash * 22).toFixed(1);
    // Second bloom layer uses uColor1 for depth — slightly offset up for painterly feel
    const r1 = Math.round(gc1.r * 255), g1 = Math.round(gc1.g * 255), b1 = Math.round(gc1.b * 255);
    const str2 = (_sMid * 0.12 + beatFlash * 0.20).toFixed(3);
    bgGradientEl.style.background =
      `radial-gradient(ellipse ${bw}% ${bh}% at 50% 50%, rgba(${r},${g},${b},${strength.toFixed(3)}) 0%, transparent 68%),` +
      `radial-gradient(ellipse 38% 30% at 52% 44%, rgba(${r1},${g1},${b1},${str2}) 0%, transparent 55%),` +
      `radial-gradient(ellipse 72% 62% at 50% 50%, transparent 28%, rgba(0,0,0,0.52) 100%)`;

    // Beat-reactive album art glow
    const _artWrap = document.getElementById('right-art-wrap');
    if (_artWrap) {
      const _gSz = (55 + beatFlash * 90 + _sBass * 45).toFixed(1);
      const _gAl = (0.15 + beatFlash * 0.50 + _sBass * 0.22).toFixed(3);
      _artWrap.style.boxShadow = `0 20px 60px rgba(0,0,0,0.65),0 0 0 1px rgba(255,255,255,0.08),0 0 ${_gSz}px rgba(${r},${g},${b},${_gAl})`;
    }
  }

  if (time - lastMetricsUi > 0.08) {
    lastMetricsUi = time;
    updateMetric(metricEls.bass, bassLevel);
    updateMetric(metricEls.mid, midLevel);
    updateMetric(metricEls.high, highLevel);
    updateMetric(metricEls.energy, audioLevel);
    const led = metricEls.led;
    if (led) {
      const r = Math.floor(26 + beatFlash * 229), g = Math.floor(beatFlash * 90);
      led.style.background = `rgb(${r},${g},0)`;
      led.style.boxShadow = beatFlash > 0.25 ? `0 0 ${Math.floor(beatFlash*10)}px rgba(255,90,18,0.9)` : 'none';
    }
  }

  // Sway + beat zoom: sphere punches toward camera on each beat then springs back
  camera.position.x = Math.sin(time * 0.23) * 0.09 + Math.sin(time * 0.67) * 0.035 + _sBass * Math.sin(time * 1.8) * 0.022 + Math.sin(time * 47.3) * _beatShake * 0.018;
  camera.position.y = 1.2 + Math.cos(time * 0.29) * 0.055 + _sBass * 0.028 + Math.cos(time * 38.9) * _beatShake * 0.012;
  camera.position.z = 4.2 - spherePulse * 0.20 - _sBass * 0.05;
  // Subtle bass-reactive lookAt — camera tilts very slightly toward sphere on heavy bass
  camera.lookAt(Math.sin(time * 0.17) * 0.03, -0.40 + _sBass * 0.06, -1.5);
  // Cinematic beat punch: briefly zoom in on beat, springs back as spherePulse decays
  const _targetFov = 45.0 - spherePulse * 1.0 - _sBass * 0.3;
  camera.fov += (_targetFov - camera.fov) * 0.12;
  camera.updateProjectionMatrix();

  if (state.visualMode !== 'liquidAura') renderer.render(scene, camera);
}

animate();

// ===================================================================
// COLOR EXTRACTION FROM ALBUM ART
// ===================================================================
function extractAccentColor(imgUrl, callback) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
    const cv = document.createElement('canvas');
    cv.width = cv.height = 50;
    const ctx = cv.getContext('2d');
    ctx.drawImage(img, 0, 0, 50, 50);
    const data = ctx.getImageData(0, 0, 50, 50).data;

    let rSum = 0, gSum = 0, bSum = 0, count = 0;
    let rAllSum = 0, gAllSum = 0, bAllSum = 0, allCount = 0;
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i], g = data[i+1], b = data[i+2];
      const brightness = (r + g + b) / 3;
      const saturation = Math.max(r, g, b) - Math.min(r, g, b);
      rAllSum += r; gAllSum += g; bAllSum += b; allCount++;
      // Widened vivid-pixel window — the old range (30-170 brightness, sat>40)
      // excluded nearly all pixels of minimalist/pastel/monochrome covers.
      if (brightness > 15 && brightness < 240 && saturation > 12) {
        rSum += r; gSum += g; bSum += b; count++;
      }
    }

    // No vivid pixels? Fall back to the whole image's average instead of a
    // fixed constant, so muted covers still get their own per-song hue.
    const n = count > 0 ? count : allCount;
    const r = (count > 0 ? rSum : rAllSum) / n / 255;
    const g = (count > 0 ? gSum : gAllSum) / n / 255;
    const b = (count > 0 ? bSum : bAllSum) / n / 255;
    const threeColor = new THREE.Color(r, g, b);
    const hsl = {};
    threeColor.getHSL(hsl);
    // Clamp lightness ≤ 0.45 and boost saturation — prevents pale/white colors
    threeColor.setHSL(hsl.h, Math.min(1.0, hsl.s * 1.4), Math.min(0.45, Math.max(0.25, hsl.l)));
    callback(`#${threeColor.getHexString()}`, threeColor);
    } catch (e) {
      callback('rgb(122,44,255)', new THREE.Color(0x7A2CFF));
    }
  };
  img.onerror = () => callback('rgb(255,96,48)', new THREE.Color(1.0, 0.376, 0.188));
  img.src = imgUrl;
}

function applyAccentColor(cssColor, threeColor) {
  // Album art drives CSS accent tokens and (per user request) the orb's target colors too.
  const hsl = {};
  threeColor.getHSL(hsl);
  const h = hsl.h;
  const s = Math.min(hsl.s * 1.25, 0.70);
  const baseL = Math.min(Math.max(hsl.l * 1.7, 0.46), 0.62);

  const accent  = new THREE.Color().setHSL(h, s, baseL);
  const accent2 = new THREE.Color().setHSL(h, Math.min(s * 0.85, 0.60), Math.min(baseL + 0.14, 0.72));

  const html = document.documentElement;
  html.style.setProperty('--accent',  '#' + accent.getHexString());
  html.style.setProperty('--accent2', '#' + accent2.getHexString());

  const ar = Math.round(accent.r * 255), ag = Math.round(accent.g * 255), ab = Math.round(accent.b * 255);
  html.style.setProperty('--accent-glow', `rgba(${ar},${ag},${ab},0.18)`);
  // Orb target colors — same hue, same dark/bright split as the theme-dot palette (THEME_SPHERE),
  // so per-song album art now drives the sphere too. In 'mix' mode this gets overwritten again on
  // the next frame by the hue-cycling loop, same precedence the CSS accent vars already had.
  _tColor1.setHSL(h, 0.90, 0.12);
  _tColor2.setHSL(h, 1.00, 0.50);
  // Feed raw album color to Liquid Aura (clamped independently inside updateLiquidAccent)
  updateLiquidAccent(threeColor);
}

// ===================================================================
// API LAYER
// ===================================================================
const API = 'http://localhost:3000';

// Login session cookie — captured from QR check body and persisted in localStorage.
// Passed explicitly as ?cookie= on every request so the API server forwards MUSIC_U to NetEase.
let sessionCookie = localStorage.getItem('netease_cookie') || '';

// Strip Set-Cookie metadata (Path, Domain, Expires, HttpOnly, Secure, SameSite) so only
// real key=value pairs (MUSIC_U, __csrf, NMTID…) are forwarded to NeteaseCloudMusicApi.
function cleanCookieString(raw) {
  const SKIP = new Set(['path','domain','expires','max-age','samesite','secure','httponly']);
  return raw.split(';').reduce((acc, part) => {
    const eq = part.indexOf('=');
    if (eq === -1) return acc;                         // bare attributes like HttpOnly
    const key = part.slice(0, eq).trim().toLowerCase();
    if (SKIP.has(key)) return acc;
    acc.push(part.trim());
    return acc;
  }, []).join('; ');
}

async function api(path) {
  const sep = path.includes('?') ? '&' : '?';
  const cookieParam = sessionCookie
    ? `${sep}cookie=${encodeURIComponent(sessionCookie)}`
    : '';
  const res = await fetch(API + path + cookieParam, {
    credentials: 'include',
    signal: AbortSignal.timeout(8000),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function searchSongs(q) {
  const data = await api(`/search?keywords=${encodeURIComponent(q)}&limit=30&type=1`);
  return data.result?.songs || [];
}

async function getSongUrl(id) {
  // Try 320k first, then fall back through quality levels
  const qualities = [
    `/song/url/v1?id=${id}&level=exhigh`,
    `/song/url/v1?id=${id}&level=standard`,
    `/song/url?id=${id}&br=128000`,
  ];
  for (const q of qualities) {
    try {
      const data = await api(q);
      const url = data.data?.[0]?.url;
      if (url) return url;
    } catch (e) { /* try next */ }
  }
  return null;
}

async function getSongDetail(id) {
  const data = await api(`/song/detail?ids=${id}`);
  return data.songs?.[0] || null;
}

async function getLyric(id) {
  const data = await api(`/lyric?id=${id}`);
  return { lrc: data.lrc?.lyric || '', tlyric: data.tlyric?.lyric || '' };
}

// ===================================================================
// LRC PARSER
// ===================================================================
function parseLRC(lrc) {
  const lines = [];
  const re = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/g;
  let m;
  while ((m = re.exec(lrc)) !== null) {
    const min = parseInt(m[1]);
    const sec = parseInt(m[2]);
    const ms  = m[3].length === 2 ? parseInt(m[3]) * 10 : parseInt(m[3]);
    const time = min * 60 + sec + ms / 1000;
    const text = m[4].trim();
    if (text) lines.push({ time, text });
  }
  lines.sort((a, b) => a.time - b.time);
  return lines;
}

// ===================================================================
// LYRIC SYNC
// ===================================================================
function syncLyrics() {
  if (!state.lyrics.length) return;
  const t = audio.currentTime;
  let idx = -1;
  for (let i = state.lyrics.length - 1; i >= 0; i--) {
    if (t >= state.lyrics[i].time) { idx = i; break; }
  }
  if (idx !== state.currentLyricIndex) {
    state.currentLyricIndex = idx;
    renderLyricHighlight(idx);
  }
}

function renderLyricHighlight(activeIdx) {
  const lines = document.querySelectorAll('.lyric-line');
  lines.forEach((el, i) => {
    const dist = Math.abs(i - activeIdx);
    el.classList.toggle('active', i === activeIdx);
    el.classList.toggle('near', dist === 1 || dist === 2);
  });
  if (activeIdx >= 0 && lines[activeIdx]) {
    lines[activeIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function renderLyrics(lyrics, transMap = new Map()) {
  const wrap = document.getElementById('lyrics-wrap');
  if (!lyrics.length) {
    wrap.innerHTML = '<div id="no-lyrics">暂无歌词</div>';
    return;
  }
  wrap.innerHTML = '';
  lyrics.forEach((line) => {
    const div = document.createElement('div');
    div.className = 'lyric-line';
    const trans = transMap.get(line.time);
    div.innerHTML = `<div>${escHtml(line.text)}</div>${trans ? `<div class="lyric-trans">${escHtml(trans)}</div>` : ''}`;
    div.addEventListener('click', () => { audio.currentTime = line.time; });
    wrap.appendChild(div);
  });
}

// ===================================================================
// PLAYLIST RENDER
// ===================================================================
function renderPlaylist(songs) {
  const wrap = document.getElementById('playlist-wrap');
  if (!songs.length) {
    wrap.innerHTML = '<div id="status-msg">没有找到结果</div>';
    return;
  }
  wrap.innerHTML = '';

  // Section label
  const label = document.createElement('div');
  label.className = 'section-label';
  label.textContent = '搜索结果';
  wrap.appendChild(label);

  songs.forEach((song, i) => {
    const artistStr = Array.isArray(song.artists)
      ? song.artists.map(a => a.name).join(' / ')
      : (song.ar ? song.ar.map(a => a.name).join(' / ') : '未知歌手');
    const dur = song.duration
      ? formatTime(song.duration / 1000)
      : (song.dt ? formatTime(song.dt / 1000) : '');

    // Album art: try al.picUrl (v2 API) or album.picUrl (v1 API)
    const picUrl = song.al?.picUrl || song.album?.picUrl || '';

    const div = document.createElement('div');
    div.className = 'song-item';
    div.dataset.idx = i;

    // Thumbnail
    let thumbHtml;
    if (picUrl) {
      thumbHtml = `<img class="song-thumb" src="${escHtml(picUrl)}?param=80y80" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="song-thumb-placeholder" style="display:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 3v12.5A4 4 0 105 19V9l10-2v8.5A4 4 0 1011 19V7L9 3z"/></svg></div>`;
    } else {
      thumbHtml = `<div class="song-thumb-placeholder"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 3v12.5A4 4 0 105 19V9l10-2v8.5A4 4 0 1011 19V7L9 3z"/></svg></div>`;
    }

    const fee = song.fee ?? 0;
    const vipBadge = (fee > 0 && !sessionCookie) ? `<span class="vip-badge" title="需要VIP">🔒</span>` : '';
    div.innerHTML = `
      ${thumbHtml}
      <div class="song-info">
        <div class="song-name">${escHtml(song.name)}${vipBadge}</div>
        <div class="song-artist">${escHtml(artistStr)}</div>
      </div>
      <div class="eq-icon"><span></span><span></span><span></span></div>
      ${dur ? `<div class="song-dur">${dur}</div>` : ''}
    `;
    div.addEventListener('click', () => playIndex(i));
    wrap.appendChild(div);
  });
}

function updatePlaylistActive(idx) {
  document.querySelectorAll('.song-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

// ===================================================================
// PLAY SONG
// ===================================================================
let loading = false;

async function playIndex(idx) {
  if (loading) return;
  if (idx < 0 || idx >= state.playlist.length) return;

  document.querySelector('.bar-song-info').classList.add('fade-out');

  loading = true;
  state.currentIndex = idx;
  updatePlaylistActive(idx);

  const song = state.playlist[idx];
  const songId = song.id;

  document.getElementById('bar-title').textContent = song.name || '加载中...';
  const artistStr = Array.isArray(song.artists)
    ? song.artists.map(a => a.name).join(' / ')
    : (song.ar ? song.ar.map(a => a.name).join(' / ') : '未知歌手');
  document.getElementById('bar-artist').textContent = artistStr;

  // Reset lyrics
  state.lyrics = [];
  state.currentLyricIndex = -1;
  renderLyrics([]);

  try {
    const [urlData, detail, lyricStr] = await Promise.all([
      getSongUrl(songId).catch(() => null),
      getSongDetail(songId).catch(() => null),
      getLyric(songId).catch(() => ({ lrc: '', tlyric: '' })),
    ]);

    if (!urlData) {
      showToast(`"${song.name}" 无版权/需VIP，已跳过`);
      document.querySelector('.bar-song-info').classList.remove('fade-out');
      loading = false;
      const next = idx + 1;
      if (next < state.playlist.length) playIndex(next);
      return;
    }

    // Album art — fall back to picUrl from search result if detail call failed
    const artUrl = detail?.al?.picUrl || song.al?.picUrl || song.album?.picUrl || '';
    const barArt = document.getElementById('bar-art');
    const barArtPlaceholder = document.getElementById('bar-art-placeholder');
    const rightArt = document.getElementById('right-album-art');
    const rightPlaceholder = document.getElementById('right-art-placeholder');
    if (artUrl) {
      barArt.src = artUrl + '?param=130y130';
      barArt.style.display = 'block';
      if (barArtPlaceholder) barArtPlaceholder.style.display = 'none';
      rightArt.src = artUrl + '?param=512y512';
      rightArt.style.display = 'block';
      rightPlaceholder.style.display = 'none';
      extractAccentColor(artUrl + '?param=50y50', applyAccentColor);
    } else {
      barArt.src = '';
      barArt.style.display = 'none';
      if (barArtPlaceholder) barArtPlaceholder.style.display = 'flex';
      rightArt.style.display = 'none';
      rightPlaceholder.style.display = 'flex';
    }

    // Right panel song info
    const rightTitle = document.getElementById('right-song-title');
    const rightArtist = document.getElementById('right-song-artist');
    if (rightTitle) rightTitle.textContent = song.name || '';
    if (rightArtist) rightArtist.textContent = artistStr;

    document.querySelector('.bar-song-info').classList.remove('fade-out');

    // Window title (Cmd+Tab / dock context) + heart state + system media controls
    document.title = `${song.name || ''} · ${artistStr} — Nebula`;
    updateLikeUI();
    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: song.name || '',
        artist: artistStr,
        album: detail?.al?.name || song.al?.name || '',
        artwork: artUrl ? [{ src: artUrl + '?param=512y512', sizes: '512x512', type: 'image/jpeg' }] : [],
      });
    }

    // Lyrics + translation
    const _lrcLines = parseLRC(lyricStr.lrc);
    const _tLines   = parseLRC(lyricStr.tlyric || '');
    const _transMap = new Map(_tLines.map(l => [l.time, l.text]));
    state.lyrics = _lrcLines;
    renderLyrics(_lrcLines, _transMap);

    // Crossfade: fade out → switch → fade in
    initAudio();
    if (!audio.paused && audio.currentTime > 0) {
      await fadeTo(0, 280);
    }
    audio.crossOrigin = 'anonymous';  // re-arm viz even after a per-song CORS fallback
    audio.src = urlData;
    audio.volume = 0;
    await audio.play().catch(e => console.warn('Play error:', e));
    fadeTo(state.volume, 350);
    addToHistory(song);

  } catch (err) {
    showToast('加载失败，请检查 API 服务');
    console.error(err);
  }

  loading = false;
}

audio.addEventListener('timeupdate', () => {
  syncLyrics();
  const dur = isFinite(audio.duration) && audio.duration > 0 ? audio.duration : 0;
  const pct = dur > 0 ? (audio.currentTime / dur) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-current').textContent = formatTime(audio.currentTime);
  document.getElementById('time-total').textContent = dur > 0 ? formatTime(dur) : '--:--';
});

  document.getElementById('icon-pause').style.display = '';
  document.body.classList.add('body-playing');

});

  document.getElementById('icon-play').style.display = '';
  document.getElementById('icon-pause').style.display = 'none';
  document.body.classList.remove('body-playing');
});

audio.addEventListener('ended', () => {
  if (state.repeat === 2) {
    audio.currentTime = 0;
    audio.play().catch(() => {});
    return;
  }
  const next = getNextIndex();
  if (next !== -1) playIndex(next);
  else if (state.repeat === 1) playIndex(0);
});

// If a CDN host ever rejects the CORS media request (crossorigin attr), retry
// the same source once without it — playback beats visualization.
let _corsRetriedSrc = '';
audio.addEventListener('error', () => {
  if (audio.crossOrigin && audio.src && _corsRetriedSrc !== audio.src) {
    _corsRetriedSrc = audio.src;
    const src = audio.src;
    const t = audio.currentTime;
    audio.crossOrigin = null;
    audio.src = src;
    audio.currentTime = t;
    audio.play().catch(() => {});
    showToast('该音源不支持可视化，已切换普通播放');
    return;
  }
  audio.crossOrigin = 'anonymous';  // restore for the next song
  showToast('播放出错，跳至下一首');
  setTimeout(() => playIndex(state.currentIndex + 1), 1000);
});

// Save position when pausing / quitting — previously only the 5s interval while
// playing saved it, so "pause → quit" lost up to the whole last session.
audio.addEventListener('pause', saveResume);
window.addEventListener('beforeunload', saveResume);

// ── System media controls (media keys, AirPods, macOS Now Playing) ──
if ('mediaSession' in navigator) {
  const ms = navigator.mediaSession;
  ms.setActionHandler('play',  () => { initAudio(); audio.play().catch(() => {}); });
  ms.setActionHandler('pause', () => audio.pause());
  ms.setActionHandler('previoustrack', () => document.getElementById('btn-prev').click());
  ms.setActionHandler('nexttrack',     () => document.getElementById('btn-next').click());
  ms.setActionHandler('seekto', d => {
    if (typeof d.seekTime === 'number' && isFinite(audio.duration)) audio.currentTime = d.seekTime;
  });
  // Keep the system progress bar in sync (throttled)
  let _msLast = 0;
  audio.addEventListener('timeupdate', () => {
    const now = performance.now();
    if (now - _msLast < 1000 || !isFinite(audio.duration) || !audio.duration) return;
    _msLast = now;
    try {
      ms.setPositionState({ duration: audio.duration, playbackRate: audio.playbackRate, position: audio.currentTime });
    } catch (_) {}
  });
}

let _shuffleHistory = [];

function getNextIndex() {
  if (!state.playlist.length) return -1;
  if (state.shuffle) {
    const unplayed = state.playlist
      .map((_, i) => i)
      .filter(i => i !== state.currentIndex && !_shuffleHistory.includes(i));
    if (!unplayed.length) { _shuffleHistory = []; return Math.floor(Math.random() * state.playlist.length); }
    const pick = unplayed[Math.floor(Math.random() * unplayed.length)];
    _shuffleHistory.push(pick);
    return pick;
  }
  return state.currentIndex < state.playlist.length - 1 ? state.currentIndex + 1 : -1;
}

document.getElementById('btn-shuffle').addEventListener('click', () => {
  state.shuffle = !state.shuffle;
  _shuffleHistory = [];
  document.getElementById('btn-shuffle').classList.toggle('active', state.shuffle);
  showToast(state.shuffle ? '随机播放 开' : '随机播放 关');

const THEME_SPHERE = {
  orange:  { c1: 0x3d0d00, c2: 0xff5012 },
  crimson: { c1: 0x3d0010, c2: 0xff1a3f },
  rose:    { c1: 0x2d0020, c2: 0xff2080 },
  violet:  { c1: 0x2A0B3D, c2: 0x7A2CFF },
  blue:    { c1: 0x001035, c2: 0x1870ff },
  teal:    { c1: 0x002520, c2: 0x00c8a0 },
  green:   { c1: 0x001f10, c2: 0x00c855 },
  mix:     { c1: 0x0a0000, c2: 0xff5012 },
};

// Sync all scene environment colors (glow sphere, rings, particles, light) to the current theme accent color.
// Call whenever the theme or album art color changes.
// BASELINE: applyEnvColor may set coreMat/haloMat glow, rings, comets, wave, bar.
// It must NOT set particleMat.color or haloMat2.color — those stay fixed muted purple.
// (Orb color itself — sphereMat.uniforms.uColor1/uColor2 — is driven separately via
// _tColor1/_tColor2, set by applyTheme()/applyAccentColor() and lerped each frame.)
function applyEnvColor(c2Color) {
  const h = {};
  c2Color.getHSL(h);
  // Keep glow color dark so AdditiveBlending layers saturate to theme hue, not white
  const glowL = Math.max(Math.min(h.l * 0.65 + 0.04, 0.30), 0.16);
  const glowCol = new THREE.Color().setHSL(h.h, Math.min(h.s, 1.0), glowL);
  _themeAccentColor.copy(glowCol); // persist for render-loop theme rim blend
  coreMat.uniforms.uGlowColor.value.copy(glowCol);
  haloMat.uniforms.uGlowColor.value.copy(glowCol);
  outerAuraMat.uniforms.uGlowColor.value.copy(glowCol);
  const ringCol = new THREE.Color().setHSL(h.h, Math.min(h.s * 0.90, 0.60), Math.min(h.l * 0.9 + 0.08, 0.55));
  orbitRings.forEach(ring => ring.material.color.copy(ringCol));
  cometHeadMats.forEach(mat => mat.color.copy(ringCol));
  cometTailMats.forEach(mat => mat.color.copy(ringCol));
  // particleMat and haloMat2 intentionally NOT recolored — fixed muted purple per governance brief.
  waveMat.color.copy(ringCol);
  barMat.color.copy(ringCol);
  sphereLight.color.copy(glowCol);
}

// applyTheme sets CSS data-theme, syncs environment colors, and (for non-mix themes)
// sets the orb's target colors too — the sphere smoothly lerps toward _tColor1/_tColor2 each frame.
// 'mix' is left alone here since the render loop already drives _tColor1/_tColor2 continuously for it.
function applyTheme(name) {
  if (!THEME_SPHERE[name]) name = 'violet';
  state.theme = name;
  const html = document.documentElement;
  html.removeAttribute('data-theme');
  html.style.removeProperty('--accent');
  html.style.removeProperty('--accent2');
  if (name !== 'orange') html.setAttribute('data-theme', name);
  document.querySelectorAll('.theme-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.theme === name);
  });
  if (name !== 'mix') {
    const sphereColors = THEME_SPHERE[name] ?? THEME_SPHERE.violet;
    _tColor1.setHex(sphereColors.c1);
    _tColor2.setHex(sphereColors.c2);
    const themeColor = new THREE.Color(sphereColors.c2);
    applyEnvColor(themeColor);
    updateLiquidAccent(themeColor);
  }
}

// ===================================================================
// CROSSFADE
// ===================================================================
let _cfTimer = null;
function fadeTo(targetVol, durationMs) {
  clearInterval(_cfTimer);
  return new Promise(resolve => {
    const start = audio.volume;
    const steps = 20;
    const stepMs = durationMs / steps;
    let s = 0;
    _cfTimer = setInterval(() => {
      s++;
      audio.volume = Math.max(0, Math.min(1, start + (targetVol - start) * s / steps));
      if (s >= steps) { clearInterval(_cfTimer); audio.volume = targetVol; resolve(); }
    }, stepMs);
  });
}

// ===================================================================
// PERSIST PREFERENCES + RESUME
// ===================================================================
function savePrefs() {
  localStorage.setItem('mp_prefs', JSON.stringify({
    shuffle: state.shuffle, repeat: state.repeat,
    theme: state.theme, volume: state.volume,
    visualMode: state.visualMode,
  }));
}

const RESUME_QUEUE_CAP = 500;   // keep localStorage well under quota (~100KB at 500 songs)

function saveResume() {
  if (state.currentIndex < 0 || !state.playlist.length) return;
  // Persist the whole queue (trimmed fields), not just the current song,
  // so a restart restores the full playing context with working next/prev.
  const queue = state.playlist.slice(0, RESUME_QUEUE_CAP).map(s => ({
    id: s.id, name: s.name,
    ar: (s.artists || s.ar || []).map(a => ({ name: a.name })),
    al: { picUrl: s.al?.picUrl || s.album?.picUrl || '' },
    dt: s.dt || 0, fee: s.fee || 0,
  }));
  try {
    localStorage.setItem('mp_resume', JSON.stringify({
      queue,
      idx: Math.min(state.currentIndex, queue.length - 1),
      time: Math.floor(audio.currentTime),
    }));
  } catch (_) { /* quota exceeded — skip this save */ }
}

setInterval(() => { if (!audio.paused) saveResume(); }, 5000);

// Restore on startup
(function restoreState() {
  const prefs = JSON.parse(localStorage.getItem('mp_prefs') || 'null');
  if (prefs) {
    if (prefs.theme) applyTheme(prefs.theme === 'orange' ? 'violet' : prefs.theme);
    if (prefs.visualMode) applyVisualMode(prefs.visualMode, true);
    if (typeof prefs.volume === 'number') {
      state.volume = prefs.volume;
      audio.volume = prefs.volume;
      document.getElementById('volume-slider').value = prefs.volume * 100;
    }
    if (prefs.shuffle) {
      state.shuffle = true;
      document.getElementById('btn-shuffle').classList.add('active');
    }
    if (prefs.repeat) {
      state.repeat = prefs.repeat;
      const btn = document.getElementById('btn-repeat');
      btn.classList.add('active');
      if (prefs.repeat === 2) {
        btn.classList.add('repeat-one');
        document.getElementById('icon-repeat-all').style.display = 'none';
        document.getElementById('icon-repeat-one').style.display = '';
      }
    }
  }

  const resume = JSON.parse(localStorage.getItem('mp_resume') || 'null');
  // New format: { queue, idx, time }. Old format ({ song, time }) still restores as a 1-song queue.
  const rQueue = resume?.queue?.length ? resume.queue : (resume?.song ? [resume.song] : null);
  if (rQueue) {
    state.playlist = rQueue;
    const rIdx = Math.min(Math.max(resume.idx ?? 0, 0), rQueue.length - 1);
    const t = resume.time || 0;
    setTimeout(async () => {
      await playIndex(rIdx);
      if (t > 3) {
        setTimeout(() => { audio.currentTime = t; }, 800);
      }
    }, 800);
  }
})();

// Progress bar seek (click + drag)
let _draggingProgress = false;
function _seekToProgress(clientX) {
  if (!audio.duration) return;
  const rect = document.getElementById('progress-bar-wrap').getBoundingClientRect();
  audio.currentTime = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)) * audio.duration;
}
document.getElementById('progress-bar-wrap').addEventListener('mousedown', (e) => {
  _draggingProgress = true;
  _seekToProgress(e.clientX);
  e.preventDefault();
});
document.addEventListener('mousemove', (e) => { if (_draggingProgress) _seekToProgress(e.clientX); });
document.addEventListener('mouseup', () => { _draggingProgress = false; });

// Progress tooltip
const _progressWrap = document.getElementById('progress-bar-wrap');
const _progressTooltip = document.getElementById('progress-tooltip');
_progressWrap.addEventListener('mousemove', (e) => {
  if (!audio.duration) return;
  const rect = _progressWrap.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  _progressTooltip.textContent = formatTime(pct * audio.duration);
  _progressTooltip.style.left = (e.clientX - rect.left) + 'px';
  _progressTooltip.classList.remove('hidden');
});
_progressWrap.addEventListener('mouseleave', () => {
  _progressTooltip.classList.add('hidden');
});

// Keyboard shortcuts: Space=play/pause, ←→=seek ±5s, ↑↓=volume ±5%, M=静音, L=喜欢, Cmd/Ctrl+F=搜索
window.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'f') {
    e.preventDefault();
    document.getElementById('search-input').focus();
    return;
  }
  if (e.target.matches('input, textarea')) return;
  if (e.key.toLowerCase() === 'm') { toggleMute(); return; }
  if (e.key.toLowerCase() === 'l') { toggleLike(); return; }
  if (e.code === 'Space') {
    e.preventDefault();
    initAudio();
    if (audio.paused) audio.play().catch(() => {});
    else audio.pause();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    audio.currentTime = Math.max(0, audio.currentTime - 5);
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 5);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    state.volume = Math.min(1, Math.round((state.volume + 0.05) * 20) / 20);
    audio.volume = state.volume;
    document.getElementById('volume-slider').value = state.volume * 100;
    showToast(`音量 ${Math.round(state.volume * 100)}%`);
    savePrefs();
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    state.volume = Math.max(0, Math.round((state.volume - 0.05) * 20) / 20);
    audio.volume = state.volume;
    document.getElementById('volume-slider').value = state.volume * 100;
    showToast(`音量 ${Math.round(state.volume * 100)}%`);
    savePrefs();
  }
});

// SLEEP TIMER
// ===================================================================
const SLEEP_STEPS = [0, 15, 30, 45, 60];
let _sleepStep = 0, _sleepTimer = null, _sleepRemaining = 0;

function updateSleepUI() {
  const btn = document.getElementById('btn-sleep');
  const ind = document.getElementById('sleep-indicator');
  if (_sleepStep === 0) { btn.classList.remove('active'); ind.textContent = ''; return; }
  btn.classList.add('active');
  const m = Math.floor(_sleepRemaining / 60);
  const s = Math.floor(_sleepRemaining % 60);
  ind.textContent = m > 0 ? `${m}m` : `${s}s`;
}

document.getElementById('btn-sleep').addEventListener('click', () => {
  clearInterval(_sleepTimer);
  _sleepStep = (_sleepStep + 1) % SLEEP_STEPS.length;
  const mins = SLEEP_STEPS[_sleepStep];
  if (mins === 0) { _sleepRemaining = 0; updateSleepUI(); showToast('睡眠定时 关'); return; }
  _sleepRemaining = mins * 60;
  updateSleepUI();
  showToast(`${mins} 分钟后停止播放`);
  _sleepTimer = setInterval(() => {
    _sleepRemaining--;
    updateSleepUI();
    if (_sleepRemaining === 60) showToast('即将停止播放 (1分钟)');
    if (_sleepRemaining <= 0) {
      clearInterval(_sleepTimer);
      _sleepStep = 0;
      updateSleepUI();
      fadeTo(0, 2500).then(() => { audio.pause(); audio.volume = state.volume; });
      showToast('已停止播放 · 晚安');
    }
  }, 1000);
});

  list.querySelectorAll('.queue-item').forEach(el => {

function toggleLike() {
  const song = currentSong();
  if (!song) { showToast('先播放一首歌'); return; }
  const liked = !favMap[song.id];
  if (liked) {
    favMap[song.id] = {
      id: song.id, name: song.name,
      ar: (song.artists || song.ar || []).map(a => ({ name: a.name })),
      al: { picUrl: song.al?.picUrl || song.album?.picUrl || '' },
      dt: song.dt || 0, at: Date.now(),

  updateLikeUI();
  showToast(liked ? '已加入喜欢 ♥' : '已取消喜欢');
  // Best-effort sync to the NetEase red-heart list when logged in
  if (sessionCookie) {
    api(`/like?id=${song.id}&like=${liked}&timestamp=${Date.now()}`).catch(() => {});
  }
}

document.getElementById('btn-like').addEventListener('click', toggleLike);

// ===================================================================
// SEARCH
// ===================================================================
let searchTimer = null;

document.getElementById('search-input').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) {
    // Show history in the browse list but leave the play queue untouched.
    renderHistory();
    return;
  }
  searchTimer = setTimeout(() => performSearch(q), 400);
});

document.getElementById('search-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    if (q) performSearch(q);
  }
});

async function performSearch(q) {
  const wrap = document.getElementById('playlist-wrap');
  wrap.innerHTML = '<div id="empty-state"><div class="spinner"></div></div>';

  try {
    const songs = await searchSongs(q);
    state.playlist = songs;
    state.currentIndex = -1;
    renderPlaylist(songs);
    if (!songs.length) {
      wrap.innerHTML = `<div id="empty-state"><span style="color:rgba(255,255,255,0.35);font-size:13px">没有找到 "${escHtml(q)}"</span></div>`;
    }
  } catch (err) {
    console.error(err);
    if (err.message.includes('Failed to fetch') || err.name === 'TimeoutError') {
      wrap.innerHTML = `<div id="status-msg">
        请先启动 NetEase Cloud Music API 服务<br>
        <span style="font-size:12px;color:var(--text-muted)">端口 3000 · <a href="https://github.com/Binaryify/NeteaseCloudMusicApi" target="_blank">安装说明</a></span>
      </div>`;
    } else {
      wrap.innerHTML = `<div id="status-msg">搜索失败: ${escHtml(err.message)}</div>`;
    }
  }
}

// ===================================================================
// UTILS
// ===================================================================
function formatTime(secs) {
  if (!secs || isNaN(secs)) return '0:00';
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ===================================================================
// PLAY HISTORY
// ===================================================================
const MAX_HISTORY = 20;
let playHistory = JSON.parse(localStorage.getItem('mp_history') || '[]');

function addToHistory(song) {
  playHistory = playHistory.filter(s => s.id !== song.id);
  playHistory.unshift({
    id: song.id, name: song.name,
    artists: song.artists || song.ar || [],
    al: song.al || {}, dt: song.dt || 0, fee: song.fee || 0
  });
  if (playHistory.length > MAX_HISTORY) playHistory.length = MAX_HISTORY;
  localStorage.setItem('mp_history', JSON.stringify(playHistory));
  if (!document.getElementById('search-input').value.trim()) renderHistory();
}

function renderHistory() {
  const wrap = document.getElementById('playlist-wrap');
  if (!playHistory.length) {
    wrap.innerHTML = `<div id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" style="color:rgba(255,255,255,0.12)"><path d="M9 3v12.5A4 4 0 105 19V9l10-2v8.5A4 4 0 1011 19V7L9 3z"/></svg>
      <span>搜索你喜欢的音乐</span>
    </div>`;
    return;
  }
  wrap.innerHTML = `<div class="history-header">最近播放</div>` +
    playHistory.map((s, i) => {
      const artist = (s.artists || s.ar || []).map(a => a.name).join(' / ') || '未知';
      const artUrl = s.al?.picUrl ? s.al.picUrl + '?param=60y60' : '';
      const dur = formatTime((s.dt || 0) / 1000);
      const fee = (s.fee === 1 || s.fee === 4) ? '<span class="vip-badge">VIP</span>' : '';
      return `<div class="song-item" data-hist-idx="${i}" role="button" tabindex="0">
        ${artUrl
          ? `<img class="song-thumb" src="${escHtml(artUrl)}" alt="" loading="lazy">`
          : `<div class="song-thumb-placeholder"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 3v12.5A4 4 0 105 19V9l10-2v8.5A4 4 0 1011 19V7L9 3z"/></svg></div>`}
        <div class="song-info">
          <div class="song-name">${escHtml(s.name || '未知')}${fee}</div>
          <div class="song-artist">${escHtml(artist)}</div>
        </div>
        <div class="eq-icon"><span></span><span></span><span></span></div>
        <div class="song-dur">${dur}</div>
      </div>`;
    }).join('');
  wrap.querySelectorAll('.song-item[data-hist-idx]').forEach(el => {
    el.addEventListener('click', () => {
      // Queue becomes the whole history list so next/prev keep working.
      const idx = parseInt(el.dataset.histIdx);
      state.playlist = playHistory.slice();
      state.currentIndex = -1;
      playIndex(idx);
    });
  });
}

// Show history immediately on startup
renderHistory();

// ===================================================================
// LOGIN STATE HELPERS
// ===================================================================
let refreshTimer = null;

let userUid = null;

function markLoggedIn(uid) {
  const btn = document.getElementById('login-btn');
  btn.textContent = '已登录';
  btn.classList.add('logged-in');
  if (uid) userUid = uid;
  // Show panel tabs and load playlists
  document.getElementById('panel-tabs').classList.remove('hidden');
  if (userUid) loadUserPlaylists(userUid);
  // 30-min heartbeat to keep cookie alive
  clearInterval(refreshTimer);
  refreshTimer = setInterval(async () => {
    try { await api(`/login/refresh?timestamp=${Date.now()}`); } catch (_) {}
  }, 30 * 60 * 1000);
}

// ===================================================================
// MY PLAYLISTS
// ===================================================================
let userPlaylists = [];
let activePlaylistId = null;

async function loadUserPlaylists(uid) {
  const wrap = document.getElementById('mylist-wrap');
  const back = document.getElementById('back-to-playlists');
  try {
    const data = await api(`/user/playlist?uid=${uid}&limit=50&timestamp=${Date.now()}`);
    userPlaylists = data.playlist || [];
    renderPlaylistList();
  } catch (e) {
    userPlaylists = [];
  }
}

function renderPlaylistList() {
  const wrap = document.getElementById('mylist-wrap');
  const back = document.getElementById('back-to-playlists');
  back.style.display = 'none';
  wrap.innerHTML = '';
  wrap.appendChild(back);
  if (!userPlaylists.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:20px 14px;font-size:12px;color:rgba(255,255,255,0.3)';
    empty.textContent = '暂无歌单';
    wrap.appendChild(empty);
    return;
  }
  userPlaylists.forEach(pl => {
    const div = document.createElement('div');
    div.className = 'my-playlist-item' + (pl.id === activePlaylistId ? ' active' : '');
    const coverUrl = pl.coverImgUrl || '';
    div.innerHTML = `
      <div class="pl-icon">${coverUrl ? `<img src="${escHtml(coverUrl)}?param=64y64" loading="lazy">` : '♪'}</div>
      <div class="pl-info">
        <div class="pl-name">${escHtml(pl.name)}</div>
        <div class="pl-count">${pl.trackCount ?? 0} 首</div>
      </div>
    `;
    div.addEventListener('click', () => loadPlaylistTracks(pl.id, pl.name));
    wrap.appendChild(div);
  });
}

async function loadPlaylistTracks(playlistId, playlistName) {
  activePlaylistId = playlistId;
  const wrap = document.getElementById('mylist-wrap');
  const back = document.getElementById('back-to-playlists');
  wrap.innerHTML = '';
  back.style.display = 'flex';
  wrap.appendChild(back);
  const loading = document.createElement('div');
  loading.style.cssText = 'padding:20px 14px;font-size:12px;color:rgba(255,255,255,0.3)';
  loading.textContent = '加载中...';
  wrap.appendChild(loading);
  try {
    const data = await api(`/playlist/track/all?id=${playlistId}&limit=1000&timestamp=${Date.now()}`);
    const songs = data.songs || [];
    state.playlist = songs;
    wrap.removeChild(loading);
    // Render song items in mylist-wrap
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = playlistName;
    wrap.appendChild(label);
    songs.forEach((song, i) => {
      const artistStr = song.ar ? song.ar.map(a => a.name).join(' / ') : '未知歌手';
      const dur = song.dt ? formatTime(song.dt / 1000) : '';
      const picUrl = song.al?.picUrl || '';
      const div = document.createElement('div');
      div.className = 'song-item';
      div.dataset.idx = i;
      let thumbHtml = picUrl
        ? `<img class="song-thumb" src="${escHtml(picUrl)}?param=80y80" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="song-thumb-placeholder" style="display:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 3v12.5A4 4 0 105 19V9l10-2v8.5A4 4 0 1011 19V7L9 3z"/></svg></div>`
        : `<div class="song-thumb-placeholder"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 3v12.5A4 4 0 105 19V9l10-2v8.5A4 4 0 1011 19V7L9 3z"/></svg></div>`;
      div.innerHTML = `
        ${thumbHtml}
        <div class="song-info">
          <div class="song-name">${escHtml(song.name)}</div>
          <div class="song-artist">${escHtml(artistStr)}</div>
        </div>
        <div class="eq-icon"><span></span><span></span><span></span></div>
        ${dur ? `<div class="song-dur">${dur}</div>` : ''}
      `;
      div.addEventListener('click', () => playIndex(i));
      wrap.appendChild(div);
    });
  } catch (e) {
    loading.textContent = '加载失败: ' + e.message;
  }
}

document.getElementById('tab-search').addEventListener('click', () => {
  document.getElementById('tab-search').classList.add('active');
  document.getElementById('tab-mylist').classList.remove('active');
  document.getElementById('playlist-wrap').style.display = 'block';
  document.getElementById('mylist-wrap').style.display = 'none';
});

document.getElementById('tab-mylist').addEventListener('click', () => {
  document.getElementById('tab-mylist').classList.add('active');
  document.getElementById('tab-search').classList.remove('active');
  document.getElementById('playlist-wrap').style.display = 'none';
  document.getElementById('mylist-wrap').style.display = 'block';
  // Always refetch so playlist changes made elsewhere (phone/web) show up immediately.
  if (userUid) loadUserPlaylists(userUid);
});

document.getElementById('back-to-playlists').addEventListener('click', () => {
  // Going back to the playlist list is a browse action — the play queue keeps
  // whatever was loaded so playback and next/prev continue uninterrupted.
  renderPlaylistList();
});

// ===================================================================
// CHECK API + LOGIN STATUS ON LOAD
// ===================================================================
(async () => {
  // Retry a few times: on a cold packaged-app launch the bundled API server
  // can take 10s+ to boot, and a single 3s check used to race it and lose
  // (login button stuck on "登录" despite a valid saved cookie).
  for (let attempt = 0; attempt < 5; attempt++) {
    try {
      await fetch(API + '/search?keywords=test&limit=1', {
        credentials: 'include',
        signal: AbortSignal.timeout(3000),
      });
      const status = await api(`/login/status?timestamp=${Date.now()}`);
      const uid = status?.data?.profile?.userId ?? status?.profile?.userId;
      if (uid) markLoggedIn(uid);
      return;
    } catch {
      await new Promise(r => setTimeout(r, 2500));
    }
  }
})();

// ===================================================================
// 网易云 QR LOGIN
// ===================================================================
let qrPollTimer = null;

async function startQrLogin() {
  const modal   = document.getElementById('qr-modal');
  const status  = document.getElementById('qr-status');
  const imgEl   = document.getElementById('qr-img');

  status.textContent = '正在生成二维码...';
  imgEl.src = '';
  modal.classList.remove('hidden');

  try {
    // Step 1: get unikey
    const keyData = await api('/login/qr/key');
    const key = keyData.data?.unikey;
    if (!key) { status.textContent = '获取失败，请检查 API 服务'; return; }

    // Step 2: get QR image (base64)
    const qrData = await api(`/login/qr/create?key=${encodeURIComponent(key)}&qrimg=true`);
    const qrImg  = qrData.data?.qrimg;
    if (!qrImg) { status.textContent = '二维码生成失败'; return; }

    imgEl.src = qrImg;
    status.textContent = '请用网易云音乐 App 扫码';

    // Step 3: poll for scan confirmation (timestamp busts cache)
    clearInterval(qrPollTimer);
    qrPollTimer = setInterval(async () => {
      try {
        const check = await api(`/login/qr/check?key=${encodeURIComponent(key)}&timestamp=${Date.now()}`);
        const code  = check.code ?? check.body?.code ?? 0;
        if (code === 802) {
          status.textContent = '已扫码，请在手机上确认登录...';
        } else if (code === 803) {
          clearInterval(qrPollTimer);
          modal.classList.add('hidden');
          if (check.cookie) {
            sessionCookie = cleanCookieString(check.cookie);
            localStorage.setItem('netease_cookie', sessionCookie);
          }
          let qrUid = null;
          try {
            const st = await api(`/login/status?timestamp=${Date.now()}`);
            qrUid = st?.data?.profile?.userId ?? st?.profile?.userId;
          } catch (_) {}
          markLoggedIn(qrUid);
          showToast('登录成功，已解锁更多歌曲 🎵');
        } else if (code === 800) {
          clearInterval(qrPollTimer);
          status.textContent = '二维码已过期，正在自动刷新...';
          setTimeout(() => startQrLogin(), 1500);
        }
      } catch (_) {}
    }, 2000);

  } catch (err) {
    status.textContent = '网络错误: ' + err.message;
  }
}

// ── Login modal: open + tab switching ──────────────────────────────
function openLoginModal(tab = 'qr') {
  document.getElementById('qr-modal').classList.remove('hidden');
  switchLoginTab(tab);
}

function switchLoginTab(tab) {
  document.getElementById('tab-qr').classList.toggle('active', tab === 'qr');
  document.getElementById('tab-phone').classList.toggle('active', tab === 'phone');
  document.getElementById('qr-section').style.display  = tab === 'qr'    ? 'block' : 'none';
  document.getElementById('phone-section').style.display = tab === 'phone' ? 'block' : 'none';
  if (tab === 'qr') {
    startQrLogin();
  } else {
    clearInterval(qrPollTimer);
    document.getElementById('phone-status').textContent = '';
  }
}

document.getElementById('login-btn').addEventListener('click', () => openLoginModal('qr'));
document.getElementById('tab-qr').addEventListener('click',    () => switchLoginTab('qr'));
document.getElementById('tab-phone').addEventListener('click', () => switchLoginTab('phone'));
document.getElementById('qr-close').addEventListener('click', () => {
  clearInterval(qrPollTimer);
  document.getElementById('qr-modal').classList.add('hidden');
});

// ── Phone / password login ──────────────────────────────────────────
document.getElementById('phone-submit').addEventListener('click', async () => {
  const phone    = document.getElementById('phone-input').value.trim();
  const password = document.getElementById('password-input').value;
  const statusEl = document.getElementById('phone-status');
  if (!phone || !password) { statusEl.textContent = '请填写手机号和密码'; return; }
  statusEl.textContent = '登录中...';
  try {
    const data = await api(
      `/login/cellphone?phone=${encodeURIComponent(phone)}&password=${encodeURIComponent(password)}&timestamp=${Date.now()}`
    );
    if (data.code === 200 || data.profile) {
      if (data.cookie) {
        sessionCookie = cleanCookieString(data.cookie);
        localStorage.setItem('netease_cookie', sessionCookie);
      }
      document.getElementById('qr-modal').classList.add('hidden');
      markLoggedIn(data.profile?.userId ?? data.account?.id ?? null);
      showToast('登录成功，已解锁完整曲库 🎵');
    } else {
      statusEl.textContent = data.message || '账号或密码错误，请重试';
    }
  } catch (e) {
    statusEl.textContent = '登录失败：' + e.message;
  }
});
